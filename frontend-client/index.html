<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audit Consulting Group · Portal Cliente</title>
  <link rel="icon" type="image/png" href="/assets/audit-ia-emblema.png" />
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f7f9fc; color: #0a2540; }
    * { box-sizing: border-box; }
    a { color: #0a2540; }
  </style>
  <script>
    // Aplica el tema de fondo ANTES de montar React para evitar el parpadeo
    // inicial. Default: "navy" (Azul medio). El usuario puede cambiarlo y la
    // elección se guarda en localStorage (ab_portal_theme).
    (function () {
      try {
        var t = localStorage.getItem("ab_portal_theme") || "navy";
        if (t && t !== "dark") document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
