# ==========================================================
# render.yaml — PRODUCCIÓN (AuditBrain)
# Backend FastAPI + Postgres administrado (F2: auth multiusuario JWT).
# Secretos con sync:false => se definen en el dashboard, no se versionan.
# ==========================================================
databases:
  - name: auditbrain-db
    # La base en producción está en Basic-1gb (de pago). El Blueprint NO puede
    # degradarla a 'free' (Render lo bloquea para proteger los datos) y eso
    # frenaba todo el sync. Alineado al plan real.
    plan: basic-1gb
    databaseName: auditbrain
    user: auditbrain

services:
  - type: web
    name: auditbrain-python-runner
    env: python
    plan: starter
    # Python 3.12.3 OBLIGATORIO: con el 3.14 por defecto de Render,
    # pandas==2.1.4 / numpy==1.26.4 no tienen wheel y fallan al compilar
    # (_PyLong_AsByteArray cambió en CPython 3.14). 3.12 usa wheels binarios.
    # Python 3.12.3 se fija vía .python-version y runtime.txt (el campo
    # pythonVersion NO existe en el schema de Blueprint de Render).
    # Producción usa requirements-prod.txt (liviano, sin OOM en starter).
    # requirements.txt legacy queda intacto para uso local/otros entornos.
    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements-prod.txt
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    autoDeploy: true

    # Disco persistente: los archivos ICT (PDFs de origen + Excel generados:
    # ICT_SRI.xlsx, ICT_PAPEL_TRABAJO.xlsx) viven aquí para SOBREVIVIR a los
    # redeploys. Antes vivían en /tmp efímero y se perdían al reiniciar el
    # contenedor (causaba "Failed to fetch" al descargar tras un deploy).
    # AUD_OF_TMP_DIR (abajo) apunta el storage a este disco montado.
    disk:
      name: auditbrain-storage
      mountPath: /var/data
      sizeGB: 1

    envVars:
      - key: AUD_OF_TMP_DIR
        value: /var/data/obligaciones_fiscales

      - key: DOCUMENT_SERVICE
        value: "https://universal-creador-documentos.onrender.com"

      # Ejecución — quick wins (timeout y concurrencia bajo control)
      - key: EXECUTION_TIMEOUT_SECONDS
        value: "600"

      - key: EXECUTION_CONCURRENCY
        value: "1"

      - key: AUDITBRAIN_MAX_STREAM_CHARS
        value: "200000"

      - key: AUDITBRAIN_RESPONSE_MODE
        value: "compact"

      - key: AUDITBRAIN_MAX_RESPONSE_TEXT_CHARS
        value: "4000"

      # --- Sandbox Tier 0 — límites de recursos (anti-OOM) ---
      # AUDITBRAIN_RLIMIT_AS_MB=0 -> sin límite de address space virtual.
      # Pandas al importarse reserva ~400-500MB virtuales (NO físicos —
      # son mmaps de shared libs + buffer pools internos de numpy).
      # Limitar AS mata pandas en pleno import antes de que pueda
      # usar siquiera RAM real. Sin límite AS, el OOM killer del kernel
      # Linux es la red de seguridad real (mata el proceso solo si
      # CONSUME demasiada RAM física). Combinado con CONCURRENCY=1,
      # mantiene el plan starter estable.
      - key: AUDITBRAIN_RLIMIT_AS_MB
        value: "0"

      - key: AUDITBRAIN_RLIMIT_CPU_SECONDS
        value: "580"

      - key: AUDITBRAIN_RLIMIT_FSIZE_MB
        value: "100"

      - key: AUDITBRAIN_RLIMIT_NOFILE
        value: "256"

      - key: AUDITBRAIN_SANDBOX_STRICT_ENV
        value: "1"

      - key: AUDITBRAIN_JOB_TTL_SECONDS
        value: "3600"

      - key: AUDITBRAIN_API_KEY
        sync: false

      - key: CORS_ALLOW_ORIGINS
        sync: false

      # --- Proveedores LLM (free-first con failover automático) ---
      # Sin AUDITBRAIN_LLM_PROVIDER explícito, el orden es:
      # gemini > groq > openrouter > anthropic > openai (gratis primero).
      # Configurar las keys en el dashboard como secretos.
      - key: GROQ_API_KEY
        sync: false

      - key: GEMINI_API_KEY
        sync: false

      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"

      - key: GEMINI_MODEL
        value: "gemini-2.0-flash"

      # --- OCR (Google Cloud Vision) — para PDFs escaneados ---
      # Pegar el JSON COMPLETO del service account en una sola línea.
      # Ver docs/OCR_SETUP_GOOGLE.md para crearlo.
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false

      # --- Canva via MCP — designs profesionales ---
      # OAuth token de Canva para que Claude API (con MCP) pueda
      # generar/editar/exportar designs en la cuenta del operador.
      # Reutiliza ANTHROPIC_API_KEY ya configurada.
      # Ver docs/CANVA_MCP_SETUP.md para obtener el token.
      - key: CANVA_MCP_OAUTH_TOKEN
        sync: false

      - key: CANVA_MCP_URL
        value: "https://mcp.canva.com/sse"

      # --- F2: auth multiusuario (JWT + Postgres) ---
      - key: DATABASE_URL
        fromDatabase:
          name: auditbrain-db
          property: connectionString

      - key: AUDITBRAIN_JWT_SECRET
        sync: false

      # --- Portal Cliente (M2): notificaciones por email Resend ---
      - key: RESEND_API_KEY
        sync: false

      - key: RESEND_FROM_EMAIL
        value: "no-reply@auditconsulting.ec"

      - key: CLIENT_PORTAL_URL
        value: "https://auditbrain-clientes.onrender.com"

      - key: AUDITBRAIN_JWT_EXPIRE_MINUTES
        value: "60"

      # --- Landing de inscripción a la charla (módulo events) ---
      # Link de invitación al grupo de WhatsApp donde se comparte el link
      # de la charla. NO es secreto (se muestra en el QR a los inscritos),
      # por eso se versiona aquí. El backend lo devuelve en la respuesta de
      # inscripción y el frontend lo renderiza como código QR.
      - key: CHARLA_WHATSAPP_GROUP_URL
        value: "https://chat.whatsapp.com/LTGW1zxsFmYJ0KOgH0GAkn"

      # Link de Zoom de la charla. NO se expone en la landing (el inscrito se
      # une vía correo a capacitación); queda server-side para el email privado.
      - key: CHARLA_ZOOM_URL
        value: "https://us02web.zoom.us/j/86936610773?pwd=rObMqOSvrGeBnGuBZz8hYXYYMgKOZS.1"

      # Casilla que recibe el aviso de cada inscripción (envío real requiere Resend).
      - key: EVENTS_NOTIFY_EMAIL
        value: "capacitacion@auditconsulting.ec"

      # ----- Portal Cliente — toggles de seguridad (modo QA / piloto) -----
      # Mientras se hacen pruebas con clientes reales, apagamos la
      # validación de DISPOSITIVO ÚNICO y SESIÓN ÚNICA para que el
      # cliente pueda alternar browsers / incógnito / pestañas sin
      # quedarse bloqueado.
      # Cuando termine la fase de pruebas y se vaya a producción real,
      # poner ambas a "true" (o eliminar las líneas) para reactivar la
      # triple seguridad: JWT + sesión única + device binding.
      # Dispositivo único: sigue APAGADO (el cliente puede entrar desde
      # laptop/oficina/casa). Solo exigimos SESIÓN única (abajo).
      - key: CLIENT_PORTAL_DEVICE_CHECK_ENABLED
        value: "false"

      # Sesión única "el primero gana" (ACTIVADA 2026-06-26): una cuenta solo
      # puede estar en uso por una persona a la vez. El segundo login se
      # bloquea con mensaje "pida al usuario que está usando que salga". La
      # sesión se libera con logout o tras CLIENT_PORTAL_SESSION_TIMEOUT_MINUTES
      # de inactividad (heartbeat del frontend cada 3 min la mantiene viva).
      - key: CLIENT_PORTAL_SESSION_CHECK_ENABLED
        value: "true"

      - key: CLIENT_PORTAL_SESSION_TIMEOUT_MINUTES
        value: "10"

      # Admin inicial (idempotente; se crea al primer arranque). Tras
      # crear el admin puedes vaciar la contraseña del dashboard.
      - key: AUDITBRAIN_BOOTSTRAP_ADMIN_EMAIL
        sync: false

      - key: AUDITBRAIN_BOOTSTRAP_ADMIN_PASSWORD
        sync: false

    healthCheckPath: "/"

  # ==========================================================
  # F2 Fase B: Frontend React (SPA estática). Solo JWT; la API Key
  # NUNCA llega al navegador. Tras desplegar, añade la URL pública de
  # este static site a CORS_ALLOW_ORIGINS del backend de arriba.
  # ==========================================================
  - type: web
    name: auditbrain-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: false
    autoDeploy: true
    # Dominio propio de la consola principal (Command Center). Para activarlo:
    #   1) En el DNS de audit-ia.ec, apuntar 'consola' con un CNAME a
    #      auditbrain-frontend.onrender.com.
    #   2) Render valida el dominio y emite el certificado SSL automáticamente.
    # Con el dominio aquí, cada push a main reconstruye y sirve la consola
    # bajo consola.audit-ia.ec (sin subir zips manualmente).
    domains:
      - consola.audit-ia.ec
    envVars:
      - key: VITE_API_BASE
        value: "https://auditbrain-python-runner.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ==========================================================
  # Portal Cliente (M2): static SPA separada para clientes externos.
  # URL pública: https://auditbrain-clientes.onrender.com
  # Comparte el mismo backend. CORS_ALLOW_ORIGINS del backend debe
  # incluir esta URL después del primer deploy.
  # ==========================================================
  - type: web
    name: auditbrain-clientes
    env: static
    buildCommand: cd frontend-shared && npm ci && cd ../frontend-client && npm ci && npm run build
    staticPublishPath: frontend-client/dist
    pullRequestPreviewsEnabled: false
    autoDeploy: true
    # Dominio propio del portal de clientes. Para que quede activo:
    #   1) En el DNS de audit-ia.ec, apuntar 'clientes' con un CNAME al
    #      destino que Render muestra en Settings → Custom Domains.
    #   2) Agregar https://clientes.audit-ia.ec a CORS_ALLOW_ORIGINS del
    #      backend (auditbrain-python-runner, env var con sync:false).
    # Con el dominio aquí, cada push a main reconstruye y sirve este SPA
    # automáticamente bajo clientes.audit-ia.ec.
    domains:
      - clientes.audit-ia.ec
    envVars:
      - key: VITE_API_BASE
        value: "https://auditbrain-python-runner.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
