# ==========================================================
# render.yaml — PRODUCCIÓN (AuditBrain)
# Backend FastAPI + Postgres administrado (F2: auth multiusuario JWT).
# Secretos con sync:false => se definen en el dashboard, no se versionan.
# ==========================================================
databases:
  - name: auditbrain-db
    plan: free
    databaseName: auditbrain
    user: auditbrain

services:
  - type: web
    name: auditbrain-python-runner
    env: python
    plan: starter
    # Python 3.12.3 OBLIGATORIO: con el 3.14 por defecto de Render,
    # pandas==2.1.4 / numpy==1.26.4 no tienen wheel y fallan al compilar
    # (_PyLong_AsByteArray cambió en CPython 3.14). 3.12 usa wheels binarios.
    # Python 3.12.3 se fija vía .python-version y runtime.txt (el campo
    # pythonVersion NO existe en el schema de Blueprint de Render).
    # Producción usa requirements-prod.txt (liviano, sin OOM en starter).
    # requirements.txt legacy queda intacto para uso local/otros entornos.
    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements-prod.txt
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    autoDeploy: true

    envVars:
      - key: DOCUMENT_SERVICE
        value: "https://universal-creador-documentos.onrender.com"

      # Ejecución — quick wins (timeout y concurrencia bajo control)
      - key: EXECUTION_TIMEOUT_SECONDS
        value: "600"

      - key: EXECUTION_CONCURRENCY
        value: "2"

      - key: AUDITBRAIN_MAX_STREAM_CHARS
        value: "200000"

      - key: AUDITBRAIN_RESPONSE_MODE
        value: "compact"

      - key: AUDITBRAIN_MAX_RESPONSE_TEXT_CHARS
        value: "4000"

      # --- Sandbox Tier 0 — límites de recursos (anti-OOM) ---
      # 180MB virtuales por job; con concurrency=2 => 360MB + ~100MB base.
      # Cabe en 512MB RAM del plan starter. Si un job se pasa, el OS mata
      # ese job sin tumbar el servicio.
      - key: AUDITBRAIN_RLIMIT_AS_MB
        value: "180"

      - key: AUDITBRAIN_RLIMIT_CPU_SECONDS
        value: "580"

      - key: AUDITBRAIN_RLIMIT_FSIZE_MB
        value: "100"

      - key: AUDITBRAIN_RLIMIT_NOFILE
        value: "256"

      - key: AUDITBRAIN_SANDBOX_STRICT_ENV
        value: "1"

      - key: AUDITBRAIN_JOB_TTL_SECONDS
        value: "3600"

      - key: AUDITBRAIN_API_KEY
        sync: false

      - key: CORS_ALLOW_ORIGINS
        sync: false

      # --- Proveedores LLM (free-first con failover automático) ---
      # Sin AUDITBRAIN_LLM_PROVIDER explícito, el orden es:
      # gemini > groq > openrouter > anthropic > openai (gratis primero).
      # Configurar las keys en el dashboard como secretos.
      - key: GROQ_API_KEY
        sync: false

      - key: GEMINI_API_KEY
        sync: false

      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"

      - key: GEMINI_MODEL
        value: "gemini-2.0-flash"

      # --- OCR (Google Cloud Vision) — para PDFs escaneados ---
      # Pegar el JSON COMPLETO del service account en una sola línea.
      # Ver docs/OCR_SETUP_GOOGLE.md para crearlo.
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false

      # --- F2: auth multiusuario (JWT + Postgres) ---
      - key: DATABASE_URL
        fromDatabase:
          name: auditbrain-db
          property: connectionString

      - key: AUDITBRAIN_JWT_SECRET
        sync: false

      - key: AUDITBRAIN_JWT_EXPIRE_MINUTES
        value: "60"

      # Admin inicial (idempotente; se crea al primer arranque). Tras
      # crear el admin puedes vaciar la contraseña del dashboard.
      - key: AUDITBRAIN_BOOTSTRAP_ADMIN_EMAIL
        sync: false

      - key: AUDITBRAIN_BOOTSTRAP_ADMIN_PASSWORD
        sync: false

    healthCheckPath: "/"

  # ==========================================================
  # F2 Fase B: Frontend React (SPA estática). Solo JWT; la API Key
  # NUNCA llega al navegador. Tras desplegar, añade la URL pública de
  # este static site a CORS_ALLOW_ORIGINS del backend de arriba.
  # ==========================================================
  - type: web
    name: auditbrain-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: false
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE
        value: "https://auditbrain-python-runner.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
