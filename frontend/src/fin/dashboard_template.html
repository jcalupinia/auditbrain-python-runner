<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUDIT-IA · __EMPRESA__ — Dashboard Ejecutivo</title>
<style>
  /* Autocontenido: SIN dependencias externas (no Google Fonts). Usa la pila de
     fuentes del sistema para que el archivo abra idéntico en cualquier PC, con o
     sin internet y aunque la red bloquee CDNs. Los @font-face con SOLO local()
     mapean los nombres usados en el CSS a fuentes ya instaladas (sin descargar
     nada); si ninguna existe, el texto cae al fallback genérico del elemento. */
  @font-face{font-family:'Poppins';src:local('Segoe UI'),local('Helvetica Neue'),local('Roboto'),local('Arial');}
  @font-face{font-family:'Montserrat';src:local('Segoe UI Semibold'),local('Segoe UI'),local('Helvetica Neue'),local('Arial');font-weight:400 700;}
  @font-face{font-family:'Roboto Mono';src:local('Consolas'),local('SFMono-Regular'),local('Menlo'),local('Liberation Mono'),local('Courier New');}
  :root{--navy:#071B2F;--navyCRE:#0A2342;--gold:#C7A83C;--green:#A6C63F;--blue:#1E5AA8;--teal:#0D7377;--steel:#1B4F72;--graphite:#2F3640;--white:#F5F7FA;--grayL:#D5D8DC;--red:#C0392B;--amber:#D68910;--greenOk:#1E8449;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--navy);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:var(--white)}
  .mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
  .topbar{background:var(--navyCRE);border-bottom:1px solid rgba(13,115,119,.3);padding:8px 0;position:sticky;top:0;z-index:100}
  .bar-inner{width:100%;max-width:1500px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .topbar .bar-inner{justify-content:space-between;min-height:54px}
  .nav-inner{gap:4px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--gold),var(--green));border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:var(--navy)}
  .logo-text{font-family:'Montserrat',Arial;font-weight:600;font-size:13px}
  .logo-sub{font-size:11px;color:var(--teal)}
  .topbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .btn{padding:7px 14px;border-radius:6px;border:1px solid rgba(13,115,119,.4);background:transparent;color:var(--grayL);cursor:pointer;font-size:12px;font-family:'Poppins',Arial;transition:all .2s}
  .btn:hover{border-color:var(--gold);color:var(--gold)}
  .btn-primary{background:rgba(199,168,60,.12);border-color:var(--gold);color:var(--gold)}
  .btn-primary:hover{background:rgba(199,168,60,.22)}
  .nav{background:var(--navyCRE);border-bottom:1px solid rgba(13,115,119,.2)}
  .nav-tab{padding:12px 16px;font-size:12px;color:var(--grayL);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
  .nav-tab:hover{color:var(--white)}
  .nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:500}
  .yearfilter{display:flex;gap:6px;align-items:center;margin-left:auto;padding:8px 0}
  .yearbtn{padding:4px 12px;border-radius:5px;border:1px solid rgba(13,115,119,.4);background:transparent;color:var(--grayL);cursor:pointer;font-size:11px;font-family:'Roboto Mono',monospace;transition:all .2s}
  .yearbtn.active{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:600}
  .content{max-width:1500px;margin:0 auto;padding:24px}
  .section{display:none}
  .section.active{display:block;animation:fade .4s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  /* ---- IMPRESIÓN / PDF ---- Imprime SOLO la pestaña activa, en A4, sin cortar
     gráficos ni tablas y sin distorsionar (los SVG usan viewBox). El botón cambia
     antes al tema 'claro' para que el texto quede oscuro sobre fondo blanco. */
  .no-print{}
  @media print{
    @page{size:A4;margin:12mm}
    html,body{background:#fff !important}
    .topbar,.nav,.yearfilter,.no-print{display:none !important}
    .content{max-width:none !important;margin:0 !important;padding:0 !important}
    .section{display:none !important}
    .section.active{display:block !important;animation:none !important}
    .panel,.kpi-card,table,svg,.kpi-grid,.grid-2,.grid-3,tr{break-inside:avoid !important;page-break-inside:avoid !important}
    .sec-head{break-after:avoid !important;page-break-after:avoid !important}
    svg,img,canvas{max-width:100% !important;height:auto !important}
    table{width:100% !important;border-collapse:collapse !important}
    *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
  }
  .sec-head{margin-bottom:20px}
  .sec-num{font-size:10px;color:var(--teal);letter-spacing:2px;text-transform:uppercase;font-family:'Roboto Mono',monospace}
  .sec-title{font-size:24px;font-weight:600;color:var(--gold);font-family:'Montserrat',Arial;letter-spacing:-.3px;margin:4px 0}
  .sec-sub{font-size:13px;color:var(--grayL);font-weight:300}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .kpi-card{background:var(--graphite);border-radius:8px;padding:16px;border-top:3px solid var(--gold)}
  .kpi-card.blue{border-top-color:var(--blue)}.kpi-card.teal{border-top-color:var(--teal)}.kpi-card.green{border-top-color:var(--green)}
  .kpi-label{font-size:10px;color:var(--grayL);text-transform:uppercase;letter-spacing:.6px;font-family:'Roboto Mono',monospace}
  .kpi-value{font-size:clamp(17px,1.55vw,26px);font-weight:300;font-family:'Roboto Mono',monospace;margin:6px 0 2px;letter-spacing:-1px;color:var(--gold);white-space:nowrap}
  .kpi-card.blue .kpi-value{color:var(--blue)}.kpi-card.teal .kpi-value{color:var(--teal)}.kpi-card.green .kpi-value{color:var(--green)}
  .kpi-delta{font-size:11px;font-family:'Roboto Mono',monospace}
  /* Tarjetas ejecutivas (estilo Command Center) */
  .ec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(205px,1fr));gap:14px}
  .ec{position:relative;overflow:hidden;background:linear-gradient(165deg,rgba(255,255,255,.045),rgba(255,255,255,0));border:1px solid rgba(213,216,220,.10);border-radius:12px;padding:18px 20px;transition:border-color .2s,transform .2s}
  .ec:hover{border-color:rgba(213,216,220,.22);transform:translateY(-2px)}
  .ec::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ec-accent,var(--gold));opacity:.9}
  .ec-label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--grayL);font-family:'Roboto Mono',monospace}
  .ec-val{font-size:clamp(24px,2.1vw,32px);font-weight:700;font-family:'Montserrat',Arial;letter-spacing:-.5px;margin:10px 0 5px;line-height:1}
  .ec-sub{font-size:11.5px;color:var(--grayL);line-height:1.45}
  /* Tarjetas con efecto 3D (Tablero de Mando Ejecutivo) */

  .kc3d:hover{transform:translateY(-3px)}
  .t3d-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:99px;font-size:11px;font-weight:600}
  .panel{background:var(--graphite);border-radius:8px;padding:18px;margin-bottom:16px}
  .panel-title{font-size:11px;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;font-weight:500}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  table{width:100%;border-collapse:collapse}
  thead tr{background:var(--navyCRE)}
  th{text-align:right;padding:9px 10px;font-size:10px;color:var(--teal);font-weight:500}
  th:first-child{text-align:left}
  td{padding:7px 10px;font-size:12px;border-bottom:1px solid rgba(13,115,119,.12);font-family:'Roboto Mono',monospace;text-align:right}
  td:first-child{text-align:left;font-family:'Poppins',Arial}
  tr.bold{background:rgba(10,35,66,.5)}
  tr.bold td{font-weight:600}
  .editable{cursor:pointer;border-bottom:1px dashed rgba(13,115,119,.6);transition:all .15s}
  .editable:hover{color:var(--gold);border-bottom-color:var(--gold)}
  .edit-input{width:90px;background:var(--navy);border:1px solid var(--gold);border-radius:3px;color:var(--gold);font-family:'Roboto Mono',monospace;font-size:12px;padding:2px 4px;text-align:right}
  .placeholder-cell{color:rgba(13,115,119,.7);font-style:italic}
  .tag{font-size:9px;padding:2px 8px;border-radius:3px;font-family:'Roboto Mono',monospace;font-weight:600}

  .tag.down{background:rgba(192,57,43,.12);color:var(--red)}

  .cover-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0}
  .cover-card{background:var(--graphite);border-radius:8px;padding:20px;border-left:3px solid var(--teal)}
  .cover-card.highlight{border-left-color:var(--gold)}
  .narrative{background:var(--graphite);border-radius:8px;padding:16px;border-left:3px solid var(--teal);font-size:13px;color:var(--grayL);line-height:1.7;margin-top:16px}
  .narrative b{color:var(--gold)}
  .insight{padding:8px 0;border-bottom:1px solid rgba(13,115,119,.12);font-size:12px;color:var(--grayL);display:flex;gap:8px;align-items:flex-start}
  .footer{border-top:1px solid rgba(13,115,119,.2);padding:10px 24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:9px;color:var(--teal);font-family:'Roboto Mono',monospace}
  .decision{padding:16px 0;border-bottom:1px solid rgba(13,115,119,.2);display:flex;gap:14px;align-items:flex-start}
  .decision-num{width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Roboto Mono',monospace;font-size:15px;flex-shrink:0}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--graphite);border:1px solid var(--gold);border-radius:8px;padding:14px 20px;color:var(--gold);font-size:13px;opacity:0;transform:translateY(20px);transition:all .3s;z-index:200;pointer-events:none}
  .toast.show{opacity:1;transform:translateY(0)}
  .svgwrap{width:100%}
  .svgwrap svg{width:100%;height:auto;display:block}
  .legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:8px}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--grayL);font-family:'Roboto Mono',monospace}
  .legend-dot{width:10px;height:10px;border-radius:2px}
  @media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.grid-2,.grid-3{grid-template-columns:1fr}}
  /* selectores de tema/layout en la barra */
  .selctl{font-family:'Poppins',Arial;cursor:pointer}
  /* ---- variantes de layout ---- */
  body.layout-compacto .content{max-width:1400px;padding:14px}
  body.layout-compacto .panel{padding:11px;margin-bottom:11px}
  body.layout-compacto .kpi-card{padding:11px}
  body.layout-compacto .kpi-value{font-size:21px}
  body.layout-compacto .svgwrap svg{max-height:210px}
  body.layout-compacto td,body.layout-compacto th{padding:5px 8px}
  body.layout-tablas .svgwrap svg{max-height:150px}
  body.layout-tablas .grid-2{grid-template-columns:1fr}
  body.layout-tablas .kpi-value{font-size:22px}
  body.layout-tablas td,body.layout-tablas th{padding:9px 12px;font-size:12.5px}
  body.layout-presentacion .content{max-width:1080px}
  body.layout-presentacion .kpi-value{font-size:32px}
  body.layout-presentacion .panel{padding:24px}
  body.layout-presentacion .sec-title{font-size:30px}
  body.layout-presentacion .svgwrap svg{max-height:340px}
  body.layout-presentacion td,body.layout-presentacion th{padding:10px 12px;font-size:13.5px}
</style>

<script>
// ════ DATA (inyectada por AUDIT-IA · CFO Intelligence) ════
const DEFAULT=__DATA__;
const DETALLE=__DETALLE__;
const BAL_DET=__BALANCE_DET__;   // balance a nivel detallado (todas las cuentas)
const CUENTAS=(function(){try{return __CUENTAS__;}catch(e){return [];}})();  // detalle por cuenta (drill-down)
const COMPARACIONES=(function(){try{return __COMPARACIONES__;}catch(e){return null;}})();  // comparaciones listas por período (parcial vs parcial + anual); null = usar variaciones clásicas
const CUENTAS_BYKEY=(function(){const m={};(Array.isArray(CUENTAS)?CUENTAS:[]).forEach(function(c){(m[c.key]=m[c.key]||[]).push(c);});return m;})();
function hayCuentasKey(k){return !!(CUENTAS_BYKEY[k]&&CUENTAS_BYKEY[k].length);}
function toggleDet(grp,el){var rs=document.querySelectorAll('tr[data-grp="'+grp+'"]');var op=false;rs.forEach(function(r){var h=(r.style.display==='none');r.style.display=h?'':'none';op=h;});if(el){var m=el.querySelector('.dtri');if(m)m.textContent=op?'▾':'▸';}}
// Filas-hijo (cuentas reales) de un rubro, ocultas. pctBase = array de bases por año.
function detChildRows(key,grp,pctBase){
  var cs=CUENTAS_BYKEY[key]||[],o='';
  cs.forEach(function(c){
    var v=YRS.map(function(y,i){return (c.vals&&c.vals[i]!=null)?c.vals[i]:0;});
    o+='<tr class="detrow" data-grp="'+grp+'" style="display:none;background:rgba(255,255,255,.02)">';
    o+='<td style="padding-left:44px;color:var(--grayL);font-size:11px">'+(c.codigo?'<span style="opacity:.5">'+c.codigo+'</span> ':'')+c.nombre+'</td>';
    o+=v.map(function(x){return '<td style="color:var(--grayL)">'+n$(x)+'</td>';}).join('');
    o+='<td>'+deltaTag(v[v.length-1],v[v.length-2])+'</td>';
    o+=v.map(function(x,i){return '<td style="color:var(--grayL);font-size:10px">'+pctOf(x,pctBase[i])+'</td>';}).join('');
    o+='</tr>';
  });
  return o;
}
const LBL_ESF=__LBL_ESF__;       // etiquetas (fechas) propias del Balance (pueden diferir del ER)
let NIVEL=__NIVEL__;             // "resumido" | "detallado"
let D=JSON.parse(JSON.stringify(DEFAULT));
const YRS=__YRS__;
const MESES=(function(){try{return __MESES__;}catch(e){return null;}})(); // meses que cubre el ER por período (para anualizar DIO/DSO)
let activeYear=YRS[YRS.length-1];
let fraudeNivel='ALTO'; // control del artefacto de la matriz de fraude: ALTO|MEDIO|BAJO|TODAS

// ════ COMPUTE ════
function compute(){
  const C={};
  YRS.forEach((y,yi)=>{
    const g=k=>D[k][y]||0;const c={};
    const _m=(Array.isArray(MESES)&&MESES[yi])?MESES[yi]:12;const _dias=_m*30.42;  // días que cubre el ER
    c.utilBruta=g("ingOrd")+g("costoVta");
    c.dna=g("dna");
    c.ebit=c.utilBruta+g("gastAdm");           // operativo antes de financieros
    c.ebitda=c.ebit+g("dna");                   // EBIT + depreciación/amortización
    c.utilOp=c.utilBruta+g("gastAdm")+g("gastFin");
    c.utilAntIR=c.utilOp+g("ingNoOrd");
    c.utilNeta=c.utilAntIR+g("irCorr")+g("irDif");
    c.resIntegral=c.utilNeta+g("ori");
    c.actCorr=g("efectivo")+g("actFin")+g("cxc")+g("cxcRelac")+g("anticiposProv")+g("inventario")+g("otrosAct")+g("actImpCorr");
    c.actNoCorr=g("propEquip")+g("actImpDif")+g("cxcLP")+g("otrosActNoCorr");c.totalAct=c.actCorr+c.actNoCorr;
    c.pasCorr=g("oblBanc")+g("cxp")+g("benefEmpl")+g("pasImpCorr")+g("cxpRelacPas")+g("provisiones")+g("otrasCxp");c.pasNoCorr=g("prestamosLP")+g("benDefLP")+g("pasImpDifLP");
    c.totalPas=c.pasCorr+c.pasNoCorr;c.patrimonio=g("capital")+g("resLegal")+g("oriAcum")+g("utilAcum");
    c.mrgBruto=g("ingOrd")?c.utilBruta/g("ingOrd"):0;c.mrgOp=g("ingOrd")?c.utilOp/g("ingOrd"):0;
    c.mrgNeto=g("ingOrd")?c.utilNeta/g("ingOrd"):0;c.liquidez=c.pasCorr?c.actCorr/c.pasCorr:0;
    c.endeud=c.totalAct?c.totalPas/c.totalAct:0;c.roe=c.patrimonio?c.utilNeta/c.patrimonio:0;
    c.dso=g("ingOrd")?Math.round(g("cxc")/(g("ingOrd")/_dias)):0;
    c.dio=g("costoVta")?Math.round(g("inventario")/(Math.abs(g("costoVta"))/_dias)):0;  // días de inventario (DIO)
    c.rotAct=c.totalAct?(g("ingOrd")*(12/_m))/c.totalAct:0;  // rotación de activos (ventas anualizadas/activos)
    c.revpar=(D.ocupacion[y]&&D.adr[y])?(D.ocupacion[y]/100*D.adr[y]):null;
    C[y]=c;
  });
  return C;
}
// ════ FORMAT ════
function n$(v){if(v==null)return"—";const a=Math.abs(v);const s=v<0?"(":"";const e=v<0?")":"";return s+"$"+Math.round(a).toLocaleString()+e;}
function pctv(a,b){if(!b)return"—";const v=((a-b)/Math.abs(b))*100;return(v>0?"+":"")+v.toFixed(1)+"%";}
function pctOf(a,b){return b?((Math.abs(a)/Math.abs(b))*100).toFixed(1)+"%":"—";}
function deltaTag(a,b){if(!b)return"";const v=(a-b)/Math.abs(b);return'<span class="tag '+(v>0.01?'up':v<-0.01?'down':'warn')+'">'+(v>0?'+':'')+(v*100).toFixed(1)+'%</span>';}
function axisFmt(v){return'$'+Math.round(v).toLocaleString();}

// ════ SVG CHARTS (no external deps) ════
const CL={gold:'#C7A83C',green:'#A6C63F',blue:'#1E5AA8',teal:'#0D7377',red:'#C0392B',amber:'#D68910',graphite:'#2F3640',grayL:'#D5D8DC',navy:'#071B2F'};
let GRID='rgba(125,135,145,.18)';let AX='#D5D8DC';

// ════ TEMAS (paletas) y LAYOUTS — seleccionables en vivo ════

function applyTheme(t){
  const th=THEMES[t]||THEMES.ejecutivo;const v=th.vars;const r=document.documentElement.style;
  Object.keys(v).forEach(k=>r.setProperty('--'+k,v[k]));
  CL.gold=v.gold;CL.green=v.green;CL.blue=v.blue;CL.teal=v.teal;CL.red=v.red;CL.amber=v.amber;CL.graphite=v.graphite;CL.grayL=v.grayL;CL.navy=v.navy;
  AX=v.grayL;GRID=(t==='claro')?'rgba(90,107,122,.22)':'rgba(125,135,145,.18)';
  THEME=t;const s=document.getElementById('selTheme');if(s)s.value=t;renderAll();
}

// ---- Impresión (PDF) de la pestaña activa ----
// Cambia al tema 'claro' (fondo blanco, texto oscuro) para que gráficos y tablas
// se impriman legibles, imprime, y restaura el tema. El @media print imprime SOLO
// la sección activa, en A4, sin cortar ni distorsionar (los SVG usan viewBox).
function imprimirPestana(){
  const prev=THEME;
  if(prev!=='claro') applyTheme('claro');
  const restore=()=>{ if(prev&&prev!=='claro') applyTheme(prev); window.removeEventListener('afterprint',restore); };
  window.addEventListener('afterprint',restore);
  setTimeout(function(){ window.print(); }, 350);
}

// Rasteriza un <svg> a PNG (data-uri) de forma OFFLINE (sin red), para que el
// gráfico aparezca como imagen nítida en Word.
function _svgToPngDataUri(svg){
  return new Promise(function(resolve){
    try{
      let w=620,h=252;const vb=svg.getAttribute('viewBox');
      if(vb){const p=vb.split(/[ ,]+/);w=+p[2]||w;h=+p[3]||h;}
      const clone=svg.cloneNode(true);clone.setAttribute('width',w);clone.setAttribute('height',h);
      const xml=new XMLSerializer().serializeToString(clone);
      const src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(xml);
      const img=new Image();
      img.onload=function(){const sc=2,c=document.createElement('canvas');c.width=w*sc;c.height=h*sc;const ctx=c.getContext('2d');ctx.fillStyle='#ffffff';ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(img,0,0,c.width,c.height);try{resolve({uri:c.toDataURL('image/png'),w:w});}catch(e){resolve(null);}};
      img.onerror=function(){resolve(null);};
      img.src=src;
    }catch(e){resolve(null);}
  });
}

// ---- Exportar la pestaña activa a Word (.doc) ----
async function exportarWord(){
  const prev=THEME;
  if(prev!=='claro'){applyTheme('claro');await new Promise(r=>setTimeout(r,300));}
  const sec=document.querySelector('.section.active');
  if(!sec){if(prev!=='claro')applyTheme(prev);return;}
  const clone=sec.cloneNode(true);
  const reales=[...sec.querySelectorAll('svg')],clones=[...clone.querySelectorAll('svg')];
  for(let i=0;i<reales.length;i++){
    const r=await _svgToPngDataUri(reales[i]);
    if(r&&clones[i]){const im=document.createElement('img');im.src=r.uri;im.setAttribute('width','600');im.style.maxWidth='100%';clones[i].replaceWith(im);}
  }
  const empresa='__EMPRESA__';
  const titulo=(sec.querySelector('.sec-title')?sec.querySelector('.sec-title').textContent:'Dashboard');
  const estilo='body{font-family:Calibri,Arial,sans-serif;color:#111;font-size:11pt}h2{color:#0A2342}table{border-collapse:collapse;width:100%}td,th{border:1px solid #999;padding:4px 6px;font-size:10pt}.panel{border:1px solid #ccc;padding:8px;margin:8px 0}.panel-title{color:#0A2342;font-weight:600;margin-bottom:6px}.sec-title{color:#0A2342;font-size:16pt;font-weight:700}.sec-num,.sec-sub{color:#555}img{max-width:100%}';
  const doc='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>'+titulo+'</title><style>'+estilo+'</style></head><body><h2>AUDIT-IA · '+empresa+'</h2>'+clone.innerHTML+'</body></html>';
  const blob=new Blob(['﻿'+doc],{type:'application/msword'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='Dashboard_'+(sec.id||'seccion').replace(/^sec-/,'')+'.doc';document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(url);},3000);
  if(prev!=='claro')applyTheme(prev);
}

// Render unificado de series. CHART_STYLE: combo|barras|lineas|area|puntos.
// series = [{name,data,color,role:'bar'|'line'}] (role solo aplica en 'combo').
function svgChart(labels,series,yfmt,tipFmt){const tip=tipFmt||yfmt;const st=CHART_STYLE||'combo';
  const W=620,H=252,pt=20,pr=16,pb=30,pl=78,iw=W-pl-pr,ih=H-pt-pb;
  let all=[];series.forEach(d=>all=all.concat(d.data));
  let max=Math.max(...all,0),min=Math.min(...all,0);if(min>0)min=0;const rng=(max-min)||1;
  const Y=v=>pt+ih-((v-min)/rng)*ih;const n=labels.length;const gw=iw/n;const cx=i=>pl+gw*i+gw/2;
  const _sm={barras:'bar',lineas:'line',area:'area',puntos:'puntos'};
  const modeOf=d=>st==='combo'?(d.role==='bar'?'bar':'line'):(_sm[st]||'line');
  const barSeries=series.filter(d=>modeOf(d)==='bar');const nb=barSeries.length;const bw=nb?Math.min(gw*0.62/nb,38):0;
  let s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">';
  for(let i=0;i<=4;i++){const gy=pt+ih*i/4;const val=max-(max-min)*i/4;s+='<line x1="'+pl+'" y1="'+gy+'" x2="'+(W-pr)+'" y2="'+gy+'" stroke="'+GRID+'" stroke-width="1"/>';s+='<text x="'+(pl-6)+'" y="'+(gy+3)+'" fill="'+AX+'" font-size="8" text-anchor="end" font-family="Roboto Mono,monospace">'+(yfmt?yfmt(val):Math.round(val))+'</text>';}
  labels.forEach((lb,i)=>{s+='<text x="'+cx(i)+'" y="'+(H-10)+'" fill="'+AX+'" font-size="10" text-anchor="middle" font-family="Roboto Mono,monospace">'+lb+'</text>';});
  barSeries.forEach((b,bi)=>{b.data.forEach((v,i)=>{const x=cx(i)-(nb*bw)/2+bi*bw;const y0=Y(0),y1=Y(v);s+='<rect x="'+x+'" y="'+Math.min(y0,y1)+'" width="'+(bw-2)+'" height="'+Math.abs(y1-y0)+'" fill="'+b.color+'" rx="3"><title>'+b.name+' '+labels[i]+': '+(tip?tip(v):v)+'</title></rect>';});});
  series.forEach(d=>{const m=modeOf(d);if(m==='bar')return;
    const pts=d.data.map((v,i)=>[cx(i),Y(v)]);const path=pts.map((p,i)=>(i?'L':'M')+p[0]+' '+p[1]).join(' ');
    if(m==='area'){s+='<path d="'+path+' L'+pts[pts.length-1][0]+' '+Y(0)+' L'+pts[0][0]+' '+Y(0)+' Z" fill="'+d.color+'" fill-opacity="0.18" stroke="none"/>';}
    if(m!=='puntos'){s+='<path d="'+path+'" fill="none" stroke="'+d.color+'" stroke-width="2.5"/>';}
    pts.forEach((p,i)=>{s+='<circle cx="'+p[0]+'" cy="'+p[1]+'" r="'+(m==='puntos'?5:4)+'" fill="'+d.color+'"><title>'+d.name+' '+labels[i]+': '+(tip?tip(d.data[i]):d.data[i])+'</title></circle>';});});
  s+='</svg>';
  const leg=series.map(d=>'<span class="legend-item"><span class="legend-dot" style="background:'+d.color+'"></span>'+d.name+'</span>').join('');
  return '<div class="svgwrap">'+s+'</div><div class="legend">'+leg+'</div>';
}
function svgCombo(labels,bars,lines,yfmt,tip){return svgChart(labels,bars.map(b=>({name:b.name,data:b.data,color:b.color,role:'bar'})).concat(lines.map(l=>({name:l.name,data:l.data,color:l.color,role:'line'}))),yfmt,tip);}
function svgLines(labels,lines,yfmt,tip){return svgChart(labels,lines.map(l=>({name:l.name,data:l.data,color:l.color,role:'line'})),yfmt,tip);}
function svgDonut(items,noLeg,center){
  const W=300,H=230,cx=W/2,cy=H/2,rO=80,rI=50;
  const total=items.reduce((a,b)=>a+Math.abs(b.value),0)||1;
  let ang=-Math.PI/2;let s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">';
  items.forEach(it=>{const frac=Math.abs(it.value)/total;const a2=ang+frac*Math.PI*2;const large=frac>0.5?1:0;
    const x1=cx+rO*Math.cos(ang),y1=cy+rO*Math.sin(ang),x2=cx+rO*Math.cos(a2),y2=cy+rO*Math.sin(a2);
    const x3=cx+rI*Math.cos(a2),y3=cy+rI*Math.sin(a2),x4=cx+rI*Math.cos(ang),y4=cy+rI*Math.sin(ang);
    s+='<path d="M'+x1+' '+y1+' A'+rO+' '+rO+' 0 '+large+' 1 '+x2+' '+y2+' L'+x3+' '+y3+' A'+rI+' '+rI+' 0 '+large+' 0 '+x4+' '+y4+' Z" fill="'+it.color+'" stroke="'+CL.navy+'" stroke-width="2"><title>'+it.label+': '+n$(it.value)+' ('+(frac*100).toFixed(1)+'%)</title></path>';
    // etiqueta de % sobre cada segmento mayor al 6%
    if(frac>0.06){const mid=(ang+a2)/2,rL=(rO+rI)/2;s+='<text x="'+(cx+rL*Math.cos(mid))+'" y="'+(cy+rL*Math.sin(mid)+3)+'" fill="#fff" font-size="10" font-weight="700" text-anchor="middle" font-family="Roboto Mono,monospace">'+(frac*100).toFixed(0)+'%</text>';}
    ang=a2;});
  if(center){s+='<text x="'+cx+'" y="'+(cy-1)+'" fill="#fff" font-size="21" font-weight="700" text-anchor="middle" font-family="Roboto Mono,monospace">'+center.big+'</text>';if(center.small)s+='<text x="'+cx+'" y="'+(cy+15)+'" fill="'+AX+'" font-size="9" text-anchor="middle" font-family="Roboto Mono,monospace">'+center.small+'</text>';}
  s+='</svg>';
  const leg=items.map(it=>'<span class="legend-item"><span class="legend-dot" style="background:'+it.color+'"></span>'+it.label+' '+(Math.abs(it.value)/total*100).toFixed(0)+'%</span>').join('');
  return '<div class="svgwrap">'+s+'</div>'+(noLeg?'':'<div class="legend" style="justify-content:center">'+leg+'</div>');
}

// Cascada (waterfall) — items:[{label,value,type:'total'|'step'}]. Totales desde 0.
function svgWaterfall(items){
  const W=620,H=270,pt=22,pr=16,pb=50,pl=78,iw=W-pl-pr,ih=H-pt-pb;
  let cum=0;const bars=items.map(it=>{ if(it.type==='total'){const b={label:it.label,from:0,to:it.value,val:it.value,kind:'total'};cum=it.value;return b;} const from=cum,to=cum+it.value;cum=to;return {label:it.label,from,to,val:it.value,kind:it.value>=0?'pos':'neg'};});
  let vals=[0];bars.forEach(b=>{vals.push(b.from,b.to);});
  let max=Math.max(...vals),min=Math.min(...vals);if(min>0)min=0;const rng=(max-min)||1;
  const Y=v=>pt+ih-((v-min)/rng)*ih;const n=bars.length,gw=iw/n,bw=Math.min(gw*0.62,46);
  const k=v=>(v<0?'-':'+')+'$'+Math.abs(Math.round(v/1000)).toLocaleString()+'k';
  let s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">';
  for(let i=0;i<=4;i++){const gy=pt+ih*i/4;const val=max-(max-min)*i/4;s+='<line x1="'+pl+'" y1="'+gy+'" x2="'+(W-pr)+'" y2="'+gy+'" stroke="'+GRID+'" stroke-width="1"/>';s+='<text x="'+(pl-6)+'" y="'+(gy+3)+'" fill="'+AX+'" font-size="8" text-anchor="end" font-family="Roboto Mono,monospace">'+axisFmt(val)+'</text>';}
  bars.forEach((b,i)=>{const cx=pl+gw*i+gw/2,x=cx-bw/2;const y0=Y(b.from),y1=Y(b.to),top=Math.min(y0,y1),h=Math.max(2,Math.abs(y1-y0));
    const color=b.kind==='total'?CL.blue:(b.kind==='pos'?CL.green:CL.red);
    if(i>0){const pcx=pl+gw*(i-1)+gw/2;s+='<line x1="'+(pcx)+'" y1="'+Y(bars[i-1].to)+'" x2="'+(x)+'" y2="'+Y(bars[i-1].to)+'" stroke="'+AX+'" stroke-dasharray="2 2" stroke-width="1" opacity="0.5"/>';}
    s+='<rect x="'+x+'" y="'+top+'" width="'+bw+'" height="'+h+'" fill="'+color+'" rx="3"><title>'+b.label+': '+n$(b.val)+'</title></rect>';
    s+='<text x="'+cx+'" y="'+(top-4)+'" fill="'+(b.kind==='neg'?CL.red:b.kind==='pos'?CL.green:AX)+'" font-size="9" text-anchor="middle" font-family="Roboto Mono,monospace">'+(b.kind==='total'?axisFmt(b.val):k(b.val))+'</text>';
    s+='<text x="'+cx+'" y="'+(H-30)+'" fill="'+AX+'" font-size="8.5" text-anchor="middle" font-family="Roboto Mono,monospace" transform="rotate(-18 '+cx+' '+(H-30)+')">'+b.label+'</text>';});
  s+='</svg>';
  return '<div class="svgwrap">'+s+'</div>';
}

// Barras 100% apiladas. labels=[períodos], segments=[{name,color,vals:[abs por período]}].
function svgStacked100(labels,segments){
  const W=620,H=258,pt=16,pr=16,pb=30,pl=44,iw=W-pl-pr,ih=H-pt-pb;
  const n=labels.length,gw=iw/n,bw=Math.min(gw*0.5,70);
  let s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">';
  for(let i=0;i<=4;i++){const gy=pt+ih*i/4;s+='<line x1="'+pl+'" y1="'+gy+'" x2="'+(W-pr)+'" y2="'+gy+'" stroke="'+GRID+'" stroke-width="1"/>';s+='<text x="'+(pl-6)+'" y="'+(gy+3)+'" fill="'+AX+'" font-size="8" text-anchor="end" font-family="Roboto Mono,monospace">'+(100-i*25)+'%</text>';}
  labels.forEach((lb,i)=>{const cx=pl+gw*i+gw/2,x=cx-bw/2;
    const tot=segments.reduce((a,sg)=>a+(sg.vals[i]||0),0)||1;let cum=0;
    segments.forEach(sg=>{const f=(sg.vals[i]||0)/tot;const h=f*ih;const yTop=pt+ih-(cum+f)*ih;
      s+='<rect x="'+x+'" y="'+yTop+'" width="'+bw+'" height="'+Math.max(0,h)+'" fill="'+sg.color+'"><title>'+sg.name+' '+lb+': '+(f*100).toFixed(1)+'%</title></rect>';
      if(f>0.07)s+='<text x="'+cx+'" y="'+(yTop+h/2+3)+'" fill="#fff" font-size="9" text-anchor="middle" font-family="Roboto Mono,monospace">'+(f*100).toFixed(0)+'%</text>';
      cum+=f;});
    s+='<text x="'+cx+'" y="'+(H-10)+'" fill="'+AX+'" font-size="10" text-anchor="middle" font-family="Roboto Mono,monospace">'+lb+'</text>';});
  s+='</svg>';
  const leg=segments.map(sg=>'<span class="legend-item"><span class="legend-dot" style="background:'+sg.color+'"></span>'+sg.name+'</span>').join('');
  return '<div class="svgwrap">'+s+'</div><div class="legend">'+leg+'</div>';
}

// Punto de equilibrio (break-even) gerencial. Barra de ventas dividida en
// "cubre costos" (teal) y "margen de seguridad / colchón" (verde), con la línea
// del punto de equilibrio (dorada). Si las ventas no alcanzan el BE, barra roja.
function svgBreakeven(labels,ventas,be){
  const W=620,H=272,pt=24,pr=16,pb=44,pl=78,iw=W-pl-pr,ih=H-pt-pb;
  let max=Math.max(...ventas,...be,0)*1.14||1;
  const Y=v=>pt+ih-(v/max)*ih;const n=labels.length,gw=iw/n,bw=Math.min(gw*0.5,72);
  let s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">';
  for(let i=0;i<=4;i++){const gy=pt+ih*i/4;const val=max-max*i/4;s+='<line x1="'+pl+'" y1="'+gy+'" x2="'+(W-pr)+'" y2="'+gy+'" stroke="'+GRID+'" stroke-width="1"/>';s+='<text x="'+(pl-6)+'" y="'+(gy+3)+'" fill="'+AX+'" font-size="8" text-anchor="end" font-family="Roboto Mono,monospace">'+axisFmt(val)+'</text>';}
  labels.forEach((lb,i)=>{const cx=pl+gw*i+gw/2,x=cx-bw/2;const y0=Y(0),yV=Y(ventas[i]),yB=Y(be[i]);
    const safe=ventas[i]>=be[i];
    if(safe){
      s+='<rect x="'+x+'" y="'+yB+'" width="'+bw+'" height="'+(y0-yB)+'" fill="'+CL.teal+'" rx="3"><title>Cubre costos '+lb+': '+n$(be[i])+'</title></rect>';
      s+='<rect x="'+x+'" y="'+yV+'" width="'+bw+'" height="'+(yB-yV)+'" fill="'+CL.green+'" opacity="0.85" rx="3"><title>Margen de seguridad '+lb+'</title></rect>';
    }else{
      s+='<rect x="'+x+'" y="'+yV+'" width="'+bw+'" height="'+(y0-yV)+'" fill="'+CL.red+'" rx="3"><title>Ventas bajo el punto de equilibrio '+lb+'</title></rect>';
    }
    s+='<line x1="'+(x-7)+'" y1="'+yB+'" x2="'+(x+bw+7)+'" y2="'+yB+'" stroke="'+CL.gold+'" stroke-width="2.5" stroke-dasharray="5 3"><title>Punto de equilibrio '+lb+': '+n$(be[i])+'</title></line>';
    const ms=ventas[i]?((ventas[i]-be[i])/ventas[i]*100):0;
    s+='<text x="'+cx+'" y="'+(yV-6)+'" fill="'+(safe?CL.green:CL.red)+'" font-size="10.5" text-anchor="middle" font-family="Roboto Mono,monospace">'+(ms>=0?'+':'')+ms.toFixed(0)+'% colchón</text>';
    s+='<text x="'+cx+'" y="'+(H-24)+'" fill="'+AX+'" font-size="9.5" text-anchor="middle" font-family="Roboto Mono,monospace">'+lb+'</text>';});
  s+='</svg>';
  const leg='<span class="legend-item"><span class="legend-dot" style="background:'+CL.teal+'"></span>Ventas que cubren costos</span><span class="legend-item"><span class="legend-dot" style="background:'+CL.green+'"></span>Margen de seguridad</span><span class="legend-item"><span class="legend-dot" style="background:'+CL.gold+'"></span>Punto de equilibrio</span>';
  return '<div class="svgwrap">'+s+'</div><div class="legend">'+leg+'</div>';
}
// Caja de interpretación gerencial bajo cada gráfico.

// Barras verticales con efecto 3D (extrusión). items:[{label,value,color}], fmt(valor).

  const wrap=(t)=>{const w=t.split(' ');if(w.length<=1||t.length<=11)return [t];const lines=[];let cur='';w.forEach(x=>{if((cur+' '+x).trim().length>12){if(cur)lines.push(cur);cur=x;}else cur=(cur+' '+x).trim();});if(cur)lines.push(cur);return lines.slice(0,2);};
  let s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block">';

  s+='<line x1="'+(pl+d)+'" y1="'+(baseY-d)+'" x2="'+(W-pr+d)+'" y2="'+(baseY-d)+'" stroke="'+AX+'" stroke-opacity=".12"/>';
  items.forEach((it,i)=>{

    s+='<polygon points="'+(x+d)+','+(yT-d)+' '+(x+bw+d)+','+(yT-d)+' '+(x+bw+d)+','+(baseY-d)+' '+(x+bw)+','+baseY+' '+(x+bw)+','+yT+'" fill="'+shade(col,-26)+'"/>';
    s+='<polygon points="'+x+','+yT+' '+(x+d)+','+(yT-d)+' '+(x+bw+d)+','+(yT-d)+' '+(x+bw)+','+yT+'" fill="'+shade(col,26)+'"/>';
    s+='<rect x="'+x+'" y="'+yT+'" width="'+bw+'" height="'+h+'" fill="'+col+'"/>';
    const vy=it.delta?(yT-d-21):(yT-d-7);
    s+='<text x="'+(x+bw/2+d/2)+'" y="'+vy+'" fill="'+AX+'" font-size="11.5" font-weight="700" text-anchor="middle" font-family="Roboto Mono,monospace">'+(fmt?fmt(it.value):it.value)+'</text>';
    if(it.delta)s+='<text x="'+(x+bw/2+d/2)+'" y="'+(yT-d-7)+'" fill="'+(it.deltaCol||AX)+'" font-size="11" font-weight="700" text-anchor="middle" font-family="Roboto Mono,monospace">'+it.delta+'</text>';
    wrap(it.label).forEach((ln,li)=>{s+='<text x="'+(x+bw/2)+'" y="'+(baseY+18+li*13)+'" fill="'+AX+'" font-size="10" text-anchor="middle" font-family="Roboto Mono,monospace">'+ln+'</text>';});
  });
  s+='</svg>';return '<div class="svgwrap">'+s+'</div>';
}

  const mOf=(yy)=>{const i=YRS.indexOf(yy);return (Array.isArray(MESES)&&MESES[i])?MESES[i]:12;};
  const anu=(v,yy)=>v*(12/mOf(yy));
  // Helpers locales (estilo ejecutivo)
  const ec=(ac,l,v,s)=>'<div class="ec" style="--ec-accent:var(--'+ac+')"><div class="ec-label">'+l+'</div><div class="ec-val" style="color:var(--white)">'+v+'</div><div class="ec-sub">'+s+'</div></div>';

  const g=(cur,prev)=>(cur!=null&&prev!=null&&Math.abs(prev)>0)?((cur-prev)/Math.abs(prev)*100):null;

  // Crecimiento destructivo (alertas del prompt)

  const kpiBand='<div class="ec-grid" style="margin-bottom:16px">'

  const li=(arr,fn)=>arr.length?('<ol style="margin:0;padding-left:18px;font-size:11.5px;color:var(--grayL);line-height:1.6">'+arr.map(x=>'<li>'+fn(x)+'</li>').join('')+'</ol>'):'<div class="tx-muted">[DATO NO DISPONIBLE]</div>';
  const riesgosL=[];
  if(stF!=='greenOk')riesgosL.push('Carga financiera elevada (gastos fin./EBITDA '+fP(gfEbitda)+')');
  if(stC==='red')riesgosL.push('Costo de ventas crece más que las ventas (presión de margen)');
  destruct.forEach(d=>riesgosL.push(d));
  cg.filter(x=>x.ot==='nuevo'&&x.l>0).slice(0,3).forEach(x=>riesgosL.push('Nuevo gasto: '+x.nombre+' ('+n$(x.l)+')'));
  cg.filter(x=>x.ot==='volatil').slice(0,3).forEach(x=>riesgosL.push('Gasto volátil: '+x.nombre+' ('+(x.dp>=0?'+':'')+x.dp.toFixed(0)+'%)'));
  if(!riesgosL.length)riesgosL.push('Sin riesgos materiales de costos/gastos en el período');
  const accionesL=[];
  if(stC!=='greenOk')accionesL.push('Renegociar costo de ventas / proveedores; revisar margen por línea');
  if(stO!=='greenOk')accionesL.push('Contener gastos operativos por debajo del crecimiento de ventas');
  if(stF!=='greenOk')accionesL.push('Reperfilar deuda y reducir el costo financiero');
  if(control.length)accionesL.push('Auditar los gastos de mayor crecimiento (Top control inmediato)');
  cg.filter(x=>x.ot==='nuevo'&&x.l>0).slice(0,2).forEach(x=>accionesL.push('Justificar/aprobar el nuevo gasto: '+x.nombre));
  if(!accionesL.length)accionesL.push('Mantener la disciplina de costos y gastos');
  const listsPanel='<div class="grid-2">'
    +'<div class="panel"><div class="panel-title">Top 10 · consumen más valor</div>'+li(consumen,x=>x.nombre+' — '+n$(x.l)+' ('+fP(x.pv)+' ventas)')+'</div>'
    +'<div class="panel"><div class="panel-title">Top 10 · control inmediato</div>'+li(control,x=>x.nombre+' — '+(x.dp>=0?'+':'')+(x.dp||0).toFixed(0)+'%'+(x.obs?' '+x.obs:''))+'</div>'
    +'<div class="panel"><div class="panel-title">Top · oportunidades de ahorro / eficiencia</div>'+li(ahorro,x=>x.nombre+' — '+n$(x.l)+' ('+(x.dp>=0?'+':'')+(x.dp||0).toFixed(0)+'%)')+'</div>'
    +'<div class="panel"><div class="panel-title">Riesgos para accionistas</div>'+li(riesgosL.slice(0,10),x=>x)+'</div>'
    +'<div class="panel"><div class="panel-title">Acciones prioritarias · Gerencia</div>'+li(accionesL.slice(0,10),x=>x)+'</div>'
    +semPanel
    +'</div>';
  // ── A / B / Conclusión ejecutiva (3 Gerencia + 3 Directorio) ──
  const A='<b>Análisis de gráficos:</b> de cada $100 vendidos, $'+(ventas(y)?(costo(y)/ventas(y)*100).toFixed(0):0)+' son costo, $'+(ventas(y)?(gOper(y)/ventas(y)*100).toFixed(0):0)+' gastos operativos y $'+(ventas(y)?(gFin(y)/ventas(y)*100).toFixed(0):0)+' financieros; quedan $'+(ventas(y)?(Math.max(0,util(y))/ventas(y)*100).toFixed(0):0)+' de utilidad. '+(cp?('Tendencia vs '+py+': ventas '+(venG>=0?'+':'')+venG.toFixed(0)+'%, costo '+(costoG>=0?'+':'')+(costoG||0).toFixed(0)+'%, EBITDA '+(ebG>=0?'+':'')+(ebG||0).toFixed(0)+'%.'):'')+' Costo financiero del crecimiento: '+cfc+'.';
  const B='<b>Análisis de KPIs:</b> Costo/Ventas '+fP(pct(costo(y),ventas(y)))+' ('+(stC==='greenOk'?'🟢':stC==='amber'?'🟡':'🔴')+'), Gastos op./Ventas '+fP(pct(gOper(y),ventas(y)))+' ('+(stO==='greenOk'?'🟢':stO==='amber'?'🟡':'🔴')+'), Gastos fin./EBITDA '+fP(gfEbitda)+' ('+(stF==='greenOk'?'🟢':stF==='amber'?'🟡':'🔴')+'), Deuda/EBITDA '+fX(deudaEb)+', margen neto '+fP(c.mrgNeto*100)+' ('+(stR==='greenOk'?'🟢':stR==='amber'?'🟡':'🔴')+'). DSCR [DATO NO DISPONIBLE — requiere servicio de deuda].';
  const mayorPeso=[['costo de ventas',pct(costo(y),ventas(y))],['gastos operativos',pct(gOper(y),ventas(y))],['gastos financieros',pct(gFin(y),ventas(y))]].sort((a,b)=>(b[1]||0)-(a[1]||0))[0];
  const valor=destruct.length>=2?'la empresa está <b style="color:var(--red)">destruyendo valor</b>':destruct.length===1?'la creación de valor está <b style="color:var(--amber)">en vigilancia</b>':'la empresa está <b style="color:var(--greenOk)">creando valor</b>';
  const concl='<b>Conclusión para Directorio y Accionistas:</b> el mayor consumidor de las ventas es <b>'+mayorPeso[0]+'</b> ('+fP(mayorPeso[1])+'). '+(stF!=='greenOk'?'El principal riesgo financiero es la carga de intereses (gastos fin./EBITDA '+fP(gfEbitda)+'). ':'La carga financiera es baja. ')+'En conjunto, '+valor+'.<br><b>3 decisiones de Gerencia (12 meses):</b> '+accionesL.slice(0,3).map((a,i)=>(i+1)+') '+a).join(' · ')+'.<br><b>3 decisiones del Directorio:</b> 1) política de costos y compras por línea de negocio; 2) estructura de capital y costo de deuda; 3) tablero de eficiencia (gasto/ventas) con metas trimestrales.';
  const detalle='<div class="panel"><div class="panel-title">Análisis ejecutivo · Directorio y Accionistas</div>'+cajaAB('A · Análisis de gráficos',A,'teal')+cajaAB('B · Análisis de KPIs',B,'gold')+cajaAB('Conclusión ejecutiva',concl,'teal')+'</div>';
  document.getElementById("sec-atipicos").innerHTML=_secHead("06 · Gastos Atípicos","Análisis de costos y gastos · Directorio y Accionistas","Análisis profundo de todos los gastos del Estado de Resultados "+(YRS[0])+"–"+(YRS[last])+" (consumo de valor) a partir de las cuentas detalladas.")
    +kpiBand
    +'<div class="grid-2">'+panelPL+panelEvo+'</div>'
    +'<div class="grid-2">'+chFin+wf+'</div>'
    +topPanel
    +'<div class="grid-2">'+kpiTab+'<div class="panel"><div class="panel-title">Costo financiero del crecimiento</div><div style="text-align:center;padding:18px 0"><div style="font-size:24px;font-weight:700;color:var(--'+cfcCol+')">'+cfc+'</div><div style="font-size:11.5px;color:var(--grayL);margin-top:8px;line-height:1.5">'+(cfcCol==='red'?'El crecimiento está aumentando el riesgo financiero futuro.':cfcCol==='amber'?'Deuda al alza con EBITDA estable: vigilar sostenibilidad.':'El crecimiento se financia de forma sostenible.')+'</div></div></div></div>'
    +listsPanel
    +detalle;
}

function renderFraude(C){
  // ═══ DETECCIÓN DE RIESGO DE FRAUDE / ERRORES (línea por línea: Balance + ER) ═══
  // Aplica los chequeos forense (NIA 240), NIIF y de control interno sobre TODAS
  // las cuentas detalladas. Lo que requiere datos que el ESF/ER no contienen
  // (presupuesto, centro de costo, mayor mensual, Benford) se declara
  // [DATO NO DISPONIBLE] — no se inventa.
  const y=activeYear,_yi=YRS.indexOf(y),py=_yi>0?YRS[_yi-1]:null,c=C[y],last=YRS.length-1;
  const CU=(Array.isArray(CUENTAS)?CUENTAS:[]);
  const ec=(ac,l,v,s)=>'<div class="ec" style="--ec-accent:var(--'+ac+')"><div class="ec-label">'+l+'</div><div class="ec-val" style="color:var(--white)">'+v+'</div><div class="ec-sub">'+s+'</div></div>';
  const cajaAB=(l,t,a)=>'<div style="margin-top:10px;padding:11px 13px;background:rgba(13,115,119,.09);border-left:3px solid var(--'+(a||'teal')+');border-radius:5px;font-size:11.5px;line-height:1.55;color:var(--grayL)"><b style="color:var(--'+(a||'teal')+')">'+l+':</b> '+t+'</div>';
  const nivCol={ALTO:'red',MEDIO:'amber',BAJO:'greenOk'},nivBg={ALTO:'rgba(192,57,43,.18)',MEDIO:'rgba(214,137,16,.18)',BAJO:'rgba(30,132,73,.20)'},nivRk={ALTO:0,MEDIO:1,BAJO:2};
  const badge=lv=>'<span style="display:inline-block;padding:2px 9px;border-radius:11px;font-size:9.5px;font-weight:700;background:'+nivBg[lv]+';color:var(--'+nivCol[lv]+')">'+lv+'</span>';
  const fP=v=>(v==null||isNaN(v))?'[N/D]':v.toFixed(1)+'%',fX=v=>(v==null||isNaN(v))?'[N/D]':v.toFixed(2)+'x';
  const NM=s=>String(s||'').toUpperCase();
  if(!CU.length){
    document.getElementById("sec-fraude").innerHTML=_secHead("Detección de Riesgo de Fraude / Errores","Revisión forense, NIIF y de control — línea por línea","Requiere las cuentas detalladas del Balance y del Estado de Resultados.")
      +_emptyMsg("[DATO NO DISPONIBLE] — Sube los balances internos con detalle por cuenta (Balance y Estado de Resultados) para ejecutar la detección línea por línea.");
    return;
  }
  const ventasY=D.ingOrd[y]||0,totalActY=c.totalAct||1;
  // ── Banderas línea por línea ──
  const flags=[];
  CU.forEach(ct=>{
    const v=YRS.map((yy,i)=>(ct.vals&&ct.vals[i]!=null)?ct.vals[i]:0);
    const f=v[0],l=v[last],dpct=f?((l-f)/Math.abs(f)*100):(Math.abs(l)>0?null:0);
    const nm=NM(ct.nombre),esBal=ct.sec!=='resultado',base=esBal?totalActY:(ventasY||1);
    const pvL=Math.abs(l)/base*100,pvF=Math.abs(f)/base*100;
    const add=(tipo,obs,norma,niv)=>flags.push({sec:ct.sec,codigo:ct.codigo,nombre:ct.nombre,v,dpct,tipo,obs,norma,niv,mat:Math.max(Math.abs(l),Math.abs(f))});
    if(f===0&&Math.abs(l)>0&&pvL>=0.5)add('Nuevo','Cuenta nueva (no existía en '+YRS[0]+'); validar sustento gerencial','NIC 8 / control',pvL>=2?'ALTO':'MEDIO');
    else if(Math.abs(f)>0&&Math.abs(l)<1e-6&&pvF>=0.5)add('Eliminado','Cuenta desaparece en '+YRS[last]+'; ¿eficiencia, reclasificación o eliminación?','NIC 1 / control',pvF>=2?'ALTO':'MEDIO');
    else if(dpct!=null&&Math.abs(dpct)>30&&pvL>=0.5)add('Volátil','Variación '+(dpct>=0?'+':'')+dpct.toFixed(0)+'% (>30%) sin explicación documentada','NIC 8 reexpresión',(Math.abs(dpct)>60&&pvL>=2)?'ALTO':'MEDIO');
    if(/OTROS|OTRAS|VARIOS|VARIAS|DIVERS|GENERAL|GESTION|NO CLASIFIC/.test(nm)&&pvL>=1)add('Comodín','Cuenta comodín/no específica ('+fP(pvL)+' de la base): destino habitual de gasto sin sustento','NIC 1 clasificación',pvL>=3?'ALTO':'MEDIO');
    if(/RELACIONAD|ACCIONISTA|VINCULAD|MATRIZ|SUBSIDIARI|INTERCOMP|\bSOCIO/.test(nm)&&Math.abs(l)>0)add('Relacionadas','Operación con partes relacionadas: recuperabilidad y precios de transferencia','NIC 24','ALTO');
    if(ct.sec==='resultado'&&/VIATIC|REPRESENTAC|CONSULTOR|HONORARIO|MOVILIZ|ATENCION|AGASAJO|PUBLICID|DONACION/.test(nm)&&pvL>=0.5)add('Discrecional','Gasto discrecional de alto riesgo de control'+(dpct!=null&&dpct>20?' (creció '+dpct.toFixed(0)+'%)':''),'Control interno / NIC 12',(dpct!=null&&dpct>20)?'ALTO':'MEDIO');
    if(/PROVISION|ESTIMACION|DETERIORO|INCOBRABLE/.test(nm)&&Math.abs(f)>0&&Math.abs(l)<Math.abs(f)*0.5)add('Provisión','Reversa/baja fuerte de provisión (posible manejo de resultado "cookie-jar")','NIC 37','MEDIO');
    if(Math.abs(l)>=1000&&Math.abs(l)%1000===0&&l===f&&pvL>=0.5)add('Monto redondo','Monto redondo idéntico entre períodos (posible estimación sin sustento)','Evidencia','BAJO');
  });
  // Traspaso compensatorio: una NUEVA ~ una ELIMINADA de magnitud similar en la misma sección
  const nuevas=flags.filter(f=>f.tipo==='Nuevo'),elim=flags.filter(f=>f.tipo==='Eliminado');
  nuevas.forEach(n2=>{const m=elim.find(e=>e.sec===n2.sec&&Math.abs(e.mat-n2.mat)<n2.mat*0.1);
    if(m)flags.push({sec:n2.sec,codigo:n2.codigo,nombre:n2.nombre+' ↔ '+m.nombre,v:n2.v,dpct:null,tipo:'Traspaso',obs:'Una cuenta nace y otra desaparece por monto similar: posible RECLASIFICACIÓN entre líneas',norma:'NIC 1.45',niv:'ALTO',mat:n2.mat});});
  flags.sort((a,b)=>(nivRk[a.niv]-nivRk[b.niv])||(b.mat-a.mat));
  const nAlto=flags.filter(f=>f.niv==='ALTO').length,nMed=flags.filter(f=>f.niv==='MEDIO').length;
  const score=nAlto*2+nMed,nivelG=score>=6?'ALTO':score>=3?'MEDIO':(flags.length?'MEDIO':'BAJO'),colG=nivCol[nivelG];
  // ── Banda KPIs ──
  const kpiBand='<div class="ec-grid" style="margin-bottom:16px">'
    +ec('blue','Cuentas revisadas',String(CU.length),'línea por línea (Balance + ER)')
    +ec('amber','Banderas detectadas',String(flags.length),nAlto+' altas · '+nMed+' medias')
    +ec(colG,'Riesgo de fraude/errores','<span style="color:var(--'+colG+')">'+nivelG+'</span>','índice interno por banderas')
    +ec('teal','Partes relacionadas',String(flags.filter(f=>f.tipo==='Relacionadas').length),'cuentas con vinculación (NIC 24)')
    +'</div>';
  // ── Índices financieros (contexto del riesgo) ──
  const dotc=cc=>'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--'+cc+');margin-right:7px;vertical-align:middle"></span>';
  const idx=[['Liquidez corriente',fX(c.liquidez),c.liquidez>=1.5?'greenOk':c.liquidez>=1?'amber':'red'],['Endeudamiento',fP(c.endeud*100),c.endeud<=.4?'greenOk':c.endeud<=.6?'amber':'red'],['ROE',fP(c.roe*100),c.roe>=.15?'greenOk':c.roe>=.08?'amber':'red'],['Margen bruto',fP(c.mrgBruto*100),c.mrgBruto>=.3?'greenOk':c.mrgBruto>=.2?'amber':'red'],['Margen neto',fP(c.mrgNeto*100),c.mrgNeto>=.1?'greenOk':c.mrgNeto>=.05?'amber':'red'],['Rotación de activos',fX(c.rotAct),c.rotAct>=1?'greenOk':'amber']];
  const idxPanel='<div class="panel"><div class="panel-title">Índices financieros · '+y+'</div><table style="font-size:12px"><tbody>'+idx.map(r=>'<tr><td style="text-align:left">'+dotc(r[2])+r[0]+'</td><td class="mono" style="text-align:right;color:var(--'+r[2]+')">'+r[1]+'</td></tr>').join('')+'</tbody></table></div>';
  // ── Top banderas por materialidad (gráfico) ──
  const topF=flags.slice(0,12);
  const chart='<div class="panel"><div class="panel-title">Cuentas señaladas · por materialidad</div>'+svgBarsH(topF.map(f=>({label:(f.nombre||'').slice(0,22),value:f.mat,color:nivCol[f.niv]==='red'?CL.red:nivCol[f.niv]==='amber'?CL.amber:CL.green})),n$)+'</div>';
  // ── MATRIZ DE AUDITORÍA: código · descripción · hallazgo · riesgo · acción ──
  const secAbr={activo:'Activo',pasivo:'Pasivo',patrimonio:'Patrimonio',resultado:'Resultados'};
  const MIT={
    'Nuevo':{r:'Gasto/partida sin historial ni aprobación previa',a:'Exigir autorización y sustento documental del nuevo registro'},
    'Eliminado':{r:'Posible reclasificación u omisión de un gasto vigilado',a:'Confirmar baja real vs reclasificación; rastrear la cuenta destino'},
    'Volátil':{r:'Error de corte o manejo de resultado entre períodos',a:'Documentar la causa de la variación y revisar el corte (NIC 8)'},
    'Comodín':{r:'Gasto sin sustento agrupado en "otros/varios"',a:'Desglosar la cuenta y soportar cada partida con su comprobante'},
    'Relacionadas':{r:'Extracción de valor / precios de transferencia',a:'Contrato, aprobación del Directorio y estudio de PT (NIC 24)'},
    'Discrecional':{r:'Gasto personal disfrazado / no deducible',a:'Política de límites, aprobación y verificación de deducibilidad (NIC 12)'},
    'Provisión':{r:'Manejo de resultado vía reversa de provisión ("cookie-jar")',a:'Soportar el cálculo de la provisión y justificar toda reversa (NIC 37)'},
    'Traspaso':{r:'Maquillaje de márgenes por reclasificación entre líneas',a:'Validar la reclasificación y su efecto en el resultado (NIC 1)'},
    'Monto redondo':{r:'Estimación o factura sin respaldo',a:'Verificar la factura/soporte real del importe'}
  };
  const baseOf=f=>(f.sec!=='resultado')?(totalActY||1):(ventasY||1);
  // Control del artefacto: filtro por nivel (centra la matriz en lo material/prioritario).
  const cntN=k=>flags.filter(f=>f.niv===k).length;
  const nivBtns=[['ALTO','🔴 Alto'],['MEDIO','🟠 Medio'],['BAJO','🟢 Bajo'],['TODAS','Todas']]
    .map(([k,l])=>'<button class="yearbtn '+(fraudeNivel===k?'active':'')+'" onclick="setFraudeNivel(\''+k+'\')">'+l+' ('+(k==='TODAS'?flags.length:cntN(k))+')</button>').join('');
  const ctrlBar='<div class="yearfilter" style="margin:0 0 12px"><span style="font-size:10px;color:var(--teal);margin-right:6px">FILTRAR MATRIZ:</span>'+nivBtns+'</div>';
  const filt=(fraudeNivel==='TODAS'?flags:flags.filter(f=>f.niv===fraudeNivel)).slice(0,40);
  let tab='<table style="font-size:11px"><thead><tr><th>Código</th><th style="text-align:left">Cuenta</th><th style="text-align:right">Monto material</th><th style="text-align:right">% base</th><th style="text-align:left">Hallazgo</th><th style="text-align:left">Riesgo → acción de mitigación</th><th style="text-align:center">Nivel</th></tr></thead><tbody>';
  filt.forEach(f=>{const mit=MIT[f.tipo]||{r:'—',a:'Revisar sustento'};
    const mv=f.mat||0,pct=mv/baseOf(f)*100,pc=pct>=2?'red':pct>=1?'amber':'grayL';
    tab+='<tr><td class="mono" style="font-size:10px">'+(f.codigo||'—')+'</td>'
      +'<td style="text-align:left">'+f.nombre+' <span style="opacity:.5;font-size:9px">('+(secAbr[f.sec]||f.sec)+')</span></td>'
      +'<td class="mono" style="text-align:right;white-space:nowrap">'+n$(mv)+'</td>'
      +'<td class="mono" style="text-align:right;color:var(--'+pc+')">'+pct.toFixed(1)+'%</td>'
      +'<td style="text-align:left;color:var(--grayL)"><b style="color:var(--'+nivCol[f.niv]+')">'+f.tipo+'</b> · '+f.obs+'</td>'
      +'<td style="text-align:left;color:var(--grayL);font-size:10.5px">'+mit.r+'. <i style="color:var(--teal)">'+mit.a+'</i> <span style="opacity:.55;font-size:9.5px">('+f.norma+')</span></td>'
      +'<td style="text-align:center">'+badge(f.niv)+'</td></tr>';});
  tab+='</tbody></table>';
  const cuentaT=fraudeNivel==='TODAS'?('todas · '+flags.length+' banderas'):('nivel '+fraudeNivel+' · '+Math.min(filt.length,flags.filter(f=>f.niv===fraudeNivel).length)+' de '+flags.length);
  const tablaPanel='<div class="panel"><div class="panel-title">Matriz de auditoría · ordenada por materialidad ($) · '+cuentaT+'</div>'+ctrlBar+(flags.length?(filt.length?tab:'<div class="tx-muted">Sin banderas en este nivel — usa el control de arriba para ver otros niveles.</div>'):'<div class="tx-muted">Sin banderas materiales en las cuentas analizadas. 🟢</div>')+'</div>';
  // ── Riesgos detectados (agrupados) ──
  const tipos={};flags.forEach(f=>{tipos[f.tipo]=(tipos[f.tipo]||0)+1;});
  const descTipo={Nuevo:'Gastos/cuentas nuevas sin historial — validar aprobación y sustento.',Eliminado:'Cuentas que desaparecen — confirmar si es eficiencia o reclasificación.',Volátil:'Variaciones >30% sin explicación — posible error de corte o manejo de resultado.',Comodín:'Cuentas "otros/varios" abultadas — riesgo de gasto sin sustento.',Relacionadas:'Operaciones con vinculadas — recuperabilidad y precios de transferencia.',Discrecional:'Gastos discrecionales (viáticos, consultorías…) — alto riesgo de control y deducibilidad.',Provisión:'Reversas de provisión — posible "cookie-jar".',Traspaso:'Reclasificación entre líneas — maquilla márgenes.','Monto redondo':'Montos redondos repetidos — posible estimación sin respaldo.'};
  const riesgosPanel='<div class="panel"><div class="panel-title">Riesgos detectados</div>'+(Object.keys(tipos).length?('<div style="display:flex;flex-direction:column;gap:9px">'+Object.keys(tipos).sort((a,b)=>tipos[b]-tipos[a]).map(t=>'<div style="display:flex;gap:10px;font-size:12px"><span class="mono" style="color:var(--amber);min-width:24px;text-align:right">'+tipos[t]+'</span><span><b style="color:var(--white)">'+t+'</b> — <span style="color:var(--grayL)">'+(descTipo[t]||'')+'</span></span></div>').join('')+'</div>'):'<div class="tx-muted">Sin riesgos materiales. 🟢</div>')+'</div>';
  // ── Posibles problemas de auditoría externa/interna ──
  const audit=[];
  if(tipos['Comodín'])audit.push('<b>Externa:</b> pruebas sustantivas y solicitud de desglose de cuentas comodín. <b>Interna:</b> exigir clasificación específica y sustento por partida.');
  if(tipos['Relacionadas'])audit.push('<b>Externa:</b> revelaciones NIC 24 y soporte de precios de transferencia. <b>Interna:</b> aprobación del Directorio y contratos formales.');
  if(tipos['Volátil']||tipos['Nuevo']||tipos['Traspaso'])audit.push('<b>Externa:</b> corte de período y posible reexpresión (NIC 8); revisar reclasificaciones. <b>Interna:</b> documentar toda variación material y su autorización.');
  if(tipos['Provisión'])audit.push('<b>Externa:</b> evaluar razonabilidad de provisiones y sus reversas (NIC 37). <b>Interna:</b> política de estimaciones con respaldo.');
  if(tipos['Discrecional'])audit.push('<b>Externa:</b> verificar deducibilidad (NIC 12) y sustento de gastos discrecionales. <b>Interna:</b> límites de autorización y rendición de cuentas.');
  audit.push('<b>Control general:</b> implantar <b>presupuesto vs real</b>, <b>centros de costo/responsable</b> y matriz de autorizaciones — hoy <b>[DATO NO DISPONIBLE]</b>; su ausencia es en sí misma una debilidad de control.');
  const auditPanel='<div class="panel"><div class="panel-title">Posibles problemas de auditoría (externa e interna)</div><div style="display:flex;flex-direction:column;gap:8px;font-size:11.5px;color:var(--grayL);line-height:1.5">'+audit.map(a=>'<div style="border-left:3px solid var(--amber);padding-left:10px">'+a+'</div>').join('')+'</div></div>';
  // ── Limitaciones de alcance ──
  const limit='<div class="panel"><div class="panel-title">Limitaciones de alcance (no ejecutable solo con ESF/ER)</div><div style="font-size:11.5px;color:var(--grayL);line-height:1.6">Estas pruebas requieren insumos adicionales y se marcan <b>[DATO NO DISPONIBLE]</b>: ley de Benford y concentración por proveedor/tercero, fraccionamiento bajo umbrales, corte mensual de cierre, presupuesto vs real, centro de costo/responsable. Para habilitarlas se necesita el <b>mayor auxiliar mensual por cuenta y tercero</b> + presupuesto. Sin ellos, este análisis <b>señala comportamiento sospechoso para investigar</b>, no prueba fraude.<br><br><b style="color:var(--teal)">Capa de machine learning (próxima fase):</b> con el mayor mensual por cuenta y tercero se puede sumar detección automática de anomalías — <i>Isolation Forest / LOF</i> (gastos atípicos), <i>ley de Benford</i> (primer dígito), <i>clustering</i> de patrones de gasto, <i>scoring</i> de riesgo por cuenta y NLP sobre descripciones. Hoy la detección es <b>basada en reglas</b> (forense + NIIF + control) por transparencia y trazabilidad; la capa ML es complementaria y requiere ese detalle transaccional.</div></div>';
  // ── Conclusión ──
  const concl='<b>Conclusión:</b> sobre '+CU.length+' cuentas revisadas línea por línea se detectaron <b>'+flags.length+'</b> banderas ('+nAlto+' altas). Nivel de riesgo de fraude/errores: <b style="color:var(--'+colG+')">'+nivelG+'</b>. '+(nAlto?'Priorizar la revisión de las banderas ALTAS (partes relacionadas, comodines materiales, traspasos y volátiles) con pruebas de sustento y corte. ':'No se observan banderas altas materiales. ')+'Recomendación: incorporar presupuesto y mayor mensual para elevar la detección de transaccional a forense.';
  document.getElementById("sec-fraude").innerHTML=_secHead("Detección de Riesgo de Fraude / Errores","Revisión forense (NIA 240), NIIF y de control — línea por línea","Balance y Estado de Resultados detallados "+(YRS[0])+"–"+(YRS[last])+". Señala comportamiento sospechoso; no sustituye una auditoría.")
    +kpiBand
    +'<div class="grid-2">'+chart+idxPanel+'</div>'
    +tablaPanel
    +'<div class="grid-2">'+riesgosPanel+auditPanel+'</div>'
    +limit
    +'<div class="panel"><div class="panel-title">Síntesis</div>'+cajaAB('Conclusión de integridad del gasto y del balance',concl,colG==='red'?'red':colG==='amber'?'gold':'teal')+'</div>';
}

function renderResumen(C){
  // ═══ TABLERO DE MANDO EJECUTIVO 3D (Resumen consolidado ER + Balance) ═══

  const M=v=>v/1e6,m$=v=>'$'+(v/1e6).toFixed(2)+'M';

  // Drivers de riesgo (consolidado honesto, ponderando solvencia)
  const improd=(D.actFin[y]||0)+(D.cxcRelac[y]||0)+(D.anticiposProv[y]||0)+(D.cxcLP[y]||0)+(D.otrosActNoCorr[y]||0),improdPct=improd/(c.totalAct||1)*100;
  const utilRet=Math.max(0,D.utilAcum?D.utilAcum[y]:0),resLegalPct=D.capital[y]?D.resLegal[y]/D.capital[y]*100:0;
  // Solvencia (continuidad) domina; los ítems operativos/gobierno solo elevan hasta MEDIO.
  const solvScore=(c.liquidez<1?3:c.liquidez<1.5?1:0)+(c.endeud>0.6?3:c.endeud>0.4?1:0)+(c.utilNeta<0?3:0);
  const opScore=(c.dio>180?1:0)+(c.dso>90?1:0)+(improdPct>5?1:0)+(utilRet>10e6?1:0)+(resLegalPct<50?1:0);
  const riskTxt=solvScore>=5?'ALTO':((solvScore>=2||opScore>=2)?'MEDIO':'BAJO'),riskCol=riskTxt==='ALTO'?RD:(riskTxt==='MEDIO'?G:GN);
  const rating=solvScore>=5?'B':(riskTxt==='MEDIO'?'BBB':'A'),tend=!py?'Estable →':c.utilNeta>cp.utilNeta*1.02?'Mejora ↗':c.utilNeta<cp.utilNeta*0.98?'Deterioro ↘':'Estable →';
  // Watch-items reales (honesto, sin sesgo positivo)
  const vigilar=[];

  if(utilRet>=100e3)vigilar.push(['Utilidades retenidas (SRI 2025)',m$(utilRet)]);

  // Helpers visuales

  // ── BLOQUE 4: Donut composición del resultado ──

  const donutPL='<div class="panel"><div class="panel-title">Composición del resultado · '+y+'</div>'+svgDonut(plSeg,false,{big:(c.mrgNeto*100).toFixed(0)+'%',small:'utilidad neta'})+'</div>';
  // ── BLOQUE 5: KPI cards Balance (3) ──

    +'</div>';
  // ── BLOQUE 6: Donut estructura de activos + semáforo ──
  const actSeg=[{label:'Cuentas por cobrar',value:c.actCorr-(D.inventario[y]||0)-caja(y),color:'#378ADD'},{label:'Inventarios',value:D.inventario[y]||0,color:'#534AB7'},{label:'Efectivo y equiv.',value:caja(y),color:G},{label:'Activo no corriente',value:c.actNoCorr,color:'#5f6e80'}].filter(s=>s.value>0);

    +'<div style="text-align:center;margin:6px 0 12px"><div style="font-size:38px;font-weight:700;color:'+riskCol+';text-shadow:0 0 30px '+riskCol+'66;font-family:Montserrat,Arial">'+riskTxt+'</div><div style="margin-top:6px">'+badge('rgba(255,255,255,0.05)',TX2,'Calificación interna · NIIF')+'</div></div>'

function renderResultados(C){
  const rows=[['Ingresos ordinarios','ingOrd',false,'bold',false],['Costo de ventas','costoVta',true,'','ind'],['Utilidad bruta',null,false,'bold','',c=>c.utilBruta],['Gastos admin, ventas y otros','gastAdm',true,'','ind'],['Utilidad operativa (EBIT)',null,false,'bold','',c=>c.ebit],['Gastos financieros','gastFin',true,'','ind'],['Ingresos no ordinarios','ingNoOrd',false,'','ind'],['Utilidad antes de IR',null,false,'bold','',c=>c.utilAntIR],['IR corriente','irCorr',true,'','ind'],['IR diferido','irDif',false,'','ind'],['Utilidad neta del año',null,false,'bold','',c=>c.utilNeta],['ORI beneficios definidos','ori',false,'','ind'],['Total resultado integral',null,false,'bold','',c=>c.resIntegral],['Depreciación y amortización (memo · incluida en gastos)',null,false,'','ind',c=>c.dna],['EBITDA (EBIT + D&A)',null,false,'bold','',c=>c.ebitda]];
  let tbody='';

    +YRS.map((y,i)=>'<td style="color:var(--grayL);font-size:10px">'+pctOf(vals[i],D.ingOrd[y])+'</td>').join('')+'</tr>';
    if(drill)tbody+=detChildRows(key,grp,YRS.map(y=>D.ingOrd[y]));});
  const y=activeYear;const _yi=YRS.indexOf(y);const py=_yi>0?YRS[_yi-1]:null;const c=C[y],cp=py?C[py]:null;
  // Insight automático
  const insight=(function(){
    if(!py)return 'Conclusión del Estado de Resultados '+y+': utilidad neta '+n$(c.utilNeta)+' con un margen neto de '+(c.mrgNeto*100).toFixed(1)+'% y margen bruto '+(c.mrgBruto*100).toFixed(1)+'%.';
    const ingD=pctv(D.ingOrd[y],D.ingOrd[py]),utD=pctv(c.utilNeta,cp.utilNeta);
    const ingBaja=D.ingOrd[y]<D.ingOrd[py];
    const driver=ingBaja?'la reducción del volumen de ventas':(c.mrgBruto<cp.mrgBruto?'la presión sobre los márgenes':'el aumento de gastos');
    const mitig=(c.mrgBruto>=0.30)?' No obstante, la empresa mantuvo un margen bruto cercano al '+(c.mrgBruto*100).toFixed(0)+'% y controló los gastos administrativos, mitigando parcialmente el impacto.':'';
    return 'Conclusión del Estado de Resultados '+y+': Los ingresos '+(ingBaja?'disminuyeron':'crecieron')+' '+ingD+' respecto a '+py+'. La utilidad neta '+(c.utilNeta<cp.utilNeta?'cayó':'aumentó')+' '+utD+' debido principalmente a '+driver+'.'+mitig;
  })();
  // ── Gráfico 1: Punto de equilibrio (break-even) gerencial ──
  // Aprox.: costo de ventas = variable; gastos admin/ventas/financieros = fijos.
  const beCalc=yy=>{const v=D.ingOrd[yy]||0;const cv=Math.abs(D.costoVta[yy]);const cf=Math.abs(D.gastAdm[yy])+Math.abs(D.gastFin[yy]);const mc=v?(v-cv)/v:0;const be=mc>0?cf/mc:0;const ms=v?(v-be)/v:0;return{v,cv,cf,mc,be,ms};};
  const ventasArr=YRS.map(yy=>D.ingOrd[yy]);

  const bk=beCalc(y),bkp=py?beCalc(py):null;
  let beTxt='En '+y+' la empresa cubre todos sus costos al vender '+n$(bk.be)+' (punto de equilibrio). Con ventas de '+n$(bk.v)+', opera con un <b>margen de seguridad de '+(bk.ms*100).toFixed(0)+'%</b>: las ventas podrían caer hasta ese porcentaje antes de entrar en pérdidas. Cada $1 vendido aporta '+(bk.mc*100).toFixed(0)+'¢ para cubrir gastos fijos y generar utilidad.';
  if(bkp)beTxt+=' El colchón '+(bk.ms>bkp.ms?'mejoró':'se redujo')+' frente a '+py+' (era '+(bkp.ms*100).toFixed(0)+'%).';
  beTxt+=' <span style="opacity:.65;font-size:10.5px">(Costo de ventas = variable; gastos admin/ventas/financieros = fijos.)</span>';
  // ── Gráfico 2: Tendencia de rentabilidad en $ (Bruta · EBIT · Neta) ──

  let trTxt;

    const rb=(c.utilBruta-cp.utilBruta)/Math.abs(cp.utilBruta||1),rn=(c.utilNeta-cp.utilNeta)/Math.abs(cp.utilNeta||1);
    const apal=rn>rb?'La utilidad neta crece más rápido que la bruta: la empresa gana eficiencia (gastos e impuestos pesan proporcionalmente menos).':'La utilidad neta avanza menos que la bruta: parte de la mejora operativa se diluye en gastos, financiamiento o impuestos.';
    trTxt='Frente a '+py+', la utilidad bruta '+gb+', la operativa (EBIT) '+ge+' y la neta '+gn+'. '+apal;
  }else trTxt='Niveles de ganancia en '+y+': bruta '+n$(c.utilBruta)+', operativa (EBIT) '+n$(c.ebit)+' y neta '+n$(c.utilNeta)+'. La distancia entre la bruta y la neta es lo que consumen gastos, financiamiento e impuestos.';
  // ── Interpretaciones de los gráficos existentes ──
  let cbTxt;
  if(py){const di=pctv(D.ingOrd[y],D.ingOrd[py]),dc=pctv(Math.abs(D.costoVta[y]),Math.abs(D.costoVta[py])),du=pctv(c.utilNeta,cp.utilNeta);
    cbTxt='Los ingresos '+(D.ingOrd[y]>=D.ingOrd[py]?'crecieron':'cayeron')+' '+di+' y el costo de ventas varió '+dc+'; la utilidad neta '+(c.utilNeta>=cp.utilNeta?'subió':'bajó')+' '+du+'. '+((c.utilNeta>cp.utilNeta&&D.ingOrd[y]>D.ingOrd[py])?'El mayor volumen se tradujo en más utilidad (apalancamiento positivo).':'Conviene revisar por qué la utilidad no acompaña el nivel de ventas.');
  }else cbTxt='Ingresos '+n$(D.ingOrd[y])+', costo de ventas '+n$(Math.abs(D.costoVta[y]))+' y utilidad neta '+n$(c.utilNeta)+' en '+y+'.';
  let mgTxt;
  if(py){const ar=(a,b)=>a>=b?'subió':'bajó';
    mgTxt='El margen bruto '+ar(c.mrgBruto,cp.mrgBruto)+' de '+(cp.mrgBruto*100).toFixed(1)+'% a '+(c.mrgBruto*100).toFixed(1)+'%, el operativo a '+(c.mrgOp*100).toFixed(1)+'% y el neto a '+(c.mrgNeto*100).toFixed(1)+'%. La brecha entre el margen bruto y el neto ('+((c.mrgBruto-c.mrgNeto)*100).toFixed(1)+' pts) refleja el peso de gastos, financiamiento e impuestos sobre cada venta.';
  }else mgTxt='Margen bruto '+(c.mrgBruto*100).toFixed(1)+'%, operativo '+(c.mrgOp*100).toFixed(1)+'% y neto '+(c.mrgNeto*100).toFixed(1)+'% en '+y+'.';
  // Base común de las donas (costo+gastos+impuestos+utilidad) para que centro,
  // segmentos y lectura coincidan exactamente.
  const plTot=yy=>(Math.abs(D.costoVta[yy])+Math.abs(D.gastAdm[yy]+D.gastFin[yy])+Math.abs(D.irCorr[yy]+D.irDif[yy])+Math.max(0,C[yy].utilNeta))||1;
  const tt=plTot(y);
  const pCost=Math.abs(D.costoVta[y])/tt*100,pGas=Math.abs(D.gastAdm[y]+D.gastFin[y])/tt*100,pImp=Math.abs(D.irCorr[y]+D.irDif[y])/tt*100,pUt=Math.max(0,c.utilNeta)/tt*100;
  let stTxt='Por cada $100 que se reparten en '+y+': $'+pCost.toFixed(0)+' van a costo de ventas, $'+pGas.toFixed(0)+' a gastos operativos, $'+pImp.toFixed(0)+' a impuestos y quedan <b>$'+pUt.toFixed(0)+' de utilidad neta</b>.';
  if(py){const pUtp=Math.max(0,cp.utilNeta)/plTot(py)*100;stTxt+=' Frente a '+py+', la utilidad por cada $100 '+(pUt>=pUtp?'mejoró':'se redujo')+' (era $'+pUtp.toFixed(0)+').';}
  // Estructura del P&L como donas comparativas (a dónde va cada $1 de ingreso),

  const cajaAB=(lbl,txt,ac)=>'<div style="margin-top:10px;padding:11px 13px;background:rgba(13,115,119,.09);border-left:3px solid var(--'+(ac||'teal')+');border-radius:5px;font-size:11.5px;line-height:1.55;color:var(--grayL)"><b style="color:var(--'+(ac||'teal')+')">'+lbl+':</b> '+txt+'</div>';

  const nivCol={ALTO:'red',MEDIO:'amber',BAJO:'greenOk'},nivBg={ALTO:'rgba(192,57,43,.18)',MEDIO:'rgba(214,137,16,.18)',BAJO:'rgba(30,132,73,.20)'},nivRank={ALTO:0,MEDIO:1,BAJO:2};

  const fP2=v=>v.toFixed(1)+'%';
  const polar=(deg,r)=>{const a=deg*Math.PI/180;return[(100+r*Math.cos(a)).toFixed(1),(100-r*Math.sin(a)).toFixed(1)];};
  const arcP=(d1,d2,col)=>{const p1=polar(d1,74),p2=polar(d2,74);return '<path d="M'+p1[0]+' '+p1[1]+' A74 74 0 0 1 '+p2[0]+' '+p2[1]+'" fill="none" stroke="'+col+'" stroke-width="15"/>';};
  // KPIs base e indicadores
  const mb=c.mrgBruto*100,mo=c.mrgOp*100,mn=c.mrgNeto*100,msg=bk.ms*100;
  const ventasG=cp?(D.ingOrd[y]-D.ingOrd[py])/Math.abs(D.ingOrd[py]||1)*100:null;
  const depNoOp=c.utilAntIR>0?(D.ingNoOrd[y]/c.utilAntIR*100):0;
  const cargaFin=c.ebitda>0?Math.abs(D.gastFin[y])/c.ebitda*100:0;
  // Calidad del crecimiento (módulo 09)
  let calCrecTxt='[Sin período previo]',calColor='teal',calG=50;
  if(cp){
    const vU=D.ingOrd[y]>D.ingOrd[py],ebU=c.ebitda>=cp.ebitda,utU=c.utilNeta>=cp.utilNeta,perdida=c.utilNeta<0;
    const venG=(D.ingOrd[y]-D.ingOrd[py])/Math.abs(D.ingOrd[py]||1),gfUp=Math.abs(D.gastFin[y])>Math.abs(D.gastFin[py]),gfG=Math.abs(D.gastFin[py])>0?(Math.abs(D.gastFin[y])-Math.abs(D.gastFin[py]))/Math.abs(D.gastFin[py]):0;

    else {calCrecTxt='Frágil';calColor='amber';calG=50;}
  }
  // 1) Banda de KPIs

  const erKpiBand='<div class="ec-grid" style="margin-bottom:16px">'
    +ec('teal','Ingresos',n$(D.ingOrd[y]),cp?kpiVs(D.ingOrd[y],D.ingOrd[py],true):'período único')
    +ec('gold','Utilidad neta',n$(c.utilNeta),cp?kpiVs(c.utilNeta,cp.utilNeta,true):'período único')
    +ec('green','Margen neto',fP2(mn),'utilidad por cada $ vendido')
    +ec(calColor,'Calidad del crecimiento','<span style="color:var(--'+calColor+')">'+calCrecTxt+'</span>',cp?'Ventas '+pctv(D.ingOrd[y],D.ingOrd[py])+' · utilidad '+pctv(c.utilNeta,cp.utilNeta):'requiere período previo')

  // 2) Cascada de rentabilidad → BARRAS 3D (Ingresos → Bruta → EBIT → Neta) con crecimiento/disminución
  const casc=[{lbl:'Ingresos',cur:D.ingOrd[y],prev:cp?D.ingOrd[py]:null,col:CL.teal},{lbl:'Utilidad bruta',cur:c.utilBruta,prev:cp?cp.utilBruta:null,col:CL.gold},{lbl:'Operativa (EBIT)',cur:c.ebit,prev:cp?cp.ebit:null,col:CL.blue},{lbl:'Utilidad neta',cur:c.utilNeta,prev:cp?cp.utilNeta:null,col:CL.green}];
  const cascBars=casc.map(x=>{const dp=(x.prev!=null&&Math.abs(x.prev)>1e-9)?((x.cur-x.prev)/Math.abs(x.prev)*100):null,grew=dp!=null&&dp>0.05,shrank=dp!=null&&dp<-0.05;return {label:x.lbl,value:x.cur,color:x.col,delta:dp==null?null:((grew?'▲ +':(shrank?'▼ ':'→ '))+dp.toFixed(1)+'%'),deltaCol:grew?CL.green:(shrank?CL.red:'#9AA5B1')};});

  // 4) Resumen de riesgo (calidad del crecimiento): semáforo + 5 indicadores

  const erKpi=[
    {lbl:'Margen bruto',cur:mb,prev:cp?cp.mrgBruto*100:null,sem:mb>=30?'greenOk':(mb>=20?'amber':'red'),low:false,nota:'Utilidad bruta / ventas'},
    {lbl:'Margen operativo',cur:mo,prev:cp?cp.mrgOp*100:null,sem:mo>=15?'greenOk':(mo>=8?'amber':'red'),low:false,nota:'EBIT / ventas'},

    +'<line x1="100" y1="100" x2="'+patNd[0]+'" y2="'+patNd[1]+'" stroke="var(--white)" stroke-width="3" stroke-linecap="round"/><circle cx="100" cy="100" r="6" fill="var(--white)"/>'
    +'<text x="100" y="119" text-anchor="middle" fill="'+(patSemC==='greenOk'?CL.green:patSemC==='amber'?CL.amber:CL.red)+'" font-size="16" font-weight="700" font-family="Montserrat,Arial">'+patNivelTxt+'</text></svg>';
  const capPerm=(D.capital[y]+D.resLegal[y])/(c.patrimonio||1)*100,crecPatNum=cp?((c.patrimonio-cp.patrimonio)/Math.abs(cp.patrimonio)*100):null;
  const patKpi=[
    {lbl:'ROE',cur:roe,prev:cp?cp.roe*100:null,fmt:fP2,sem:roe>=15?'greenOk':(roe>=8?'amber':'red'),low:false,nota:'Utilidad neta / patrimonio'},
    {lbl:'Autonomía financiera',cur:autonomia,prev:cp?(1-cp.endeud)*100:null,fmt:fP2,sem:autonomia>=60?'greenOk':(autonomia>=40?'amber':'red'),low:false,nota:'Patrimonio / activo total'},

    {lbl:'Capital + reservas / patrim.',cur:capPerm,prev:null,fmt:fP2,sem:'teal',low:false,nota:'Base patrimonial estable'}

  const patKpiCards=patKpi.map(k=>{
    let delta='<span style="font-size:10px;color:var(--grayL)">único período</span>';
    if(k.prev!=null){const same=Math.abs(k.cur-k.prev)<1e-9,better=k.low?k.cur<k.prev:k.cur>k.prev,arr=same?'→':(k.cur>k.prev?'▲':'▼'),col=same?'grayL':(better?'green':'red');
      delta='<span style="color:var(--'+col+');font-size:10px">'+arr+' ant. '+k.fmt(k.prev)+'</span>';}

  }).join('');
  const patResumen='<div class="panel"><div class="panel-title">Resumen de riesgo</div><div style="display:flex;gap:22px;align-items:center;flex-wrap:wrap"><div style="text-align:center;flex:0 0 auto"><div style="font-size:9.5px;color:var(--grayL);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Nivel de riesgo patrimonial</div>'+patGauge+'</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;flex:1;min-width:300px">'+patKpiCards+'</div></div></div>';
  // FASE 11 (módulo 03) — Análisis A/B + Cierre obligatorio
  const pctOfPat=v=>(v/(c.patrimonio||1)*100).toFixed(0)+'%';
  const patA='<b>Estructura y origen del crecimiento:</b> el patrimonio de '+n$(c.patrimonio)+' financia el '+autonomia.toFixed(0)+'% del activo. Composición: capital '+pctOfPat(D.capital[y])+', reservas '+pctOfPat(D.resLegal[y])+', resultados acumulados '+pctOfPat(Math.max(0,D.utilAcum[y]-c.utilNeta))+', utilidad del ejercicio '+pctOfPat(Math.max(0,c.utilNeta))+'. '+(cp?('Creció '+crecPat+' vs '+py+', impulsado por '+(c.utilNeta>0?'la utilidad del ejercicio y la retención de resultados (crecimiento real, no por revalorizaciones ni ajustes no realizados)':'ajustes patrimoniales')+'.'):'Único período disponible.')+' Calidad patrimonial (capital+reservas)/patrimonio = '+calidadPat.toFixed(0)+'% ('+(calidadPat>=50?'🟢 alta':calidadPat>=30?'🟡 media':'🔴 baja: depende de utilidades acumuladas')+').';
  const patB='<b>Financiero, societario y tributario:</b> ROE '+roe.toFixed(0)+'%, autonomía '+autonomia.toFixed(0)+'%, Pasivo/Patrimonio '+(patPasPatr!=null?patPasPatr.toFixed(0)+'%':'[N/D]')+'. Reserva legal '+resLegalPct.toFixed(0)+'% del capital ('+(resLegalPct>=50?'cumple el 50%':'aún no alcanza el 50% legal — apropiar utilidades')+'). Utilidades retenidas sujetas a revisión = '+n$(utilRet)+' ('+(utilRet>10e6?'🔴 alerta alta':utilRet>1e6?'🟠 alerta media':utilRet>=100e3?'🟡 informativa':'sin alerta')+'). '+(utilRet>=100e3?'⚠️ Bajo el régimen ecuatoriano vigente desde sep-2025, las utilidades no distribuidas ni capitalizadas al 31-jul podrían generar un pago a cuenta recuperable sobre utilidades no distribuidas, sujeto a validación del SRI. ':'')+'CxC relacionadas/patrimonio '+(relPatr!=null?relPatr.toFixed(0)+'%':'[N/D]')+(relPatr!=null&&relPatr>10?' (🔴 patrimonio parcialmente inmovilizado en relacionadas)':'')+'. Crédito por impuesto a utilidades retenidas: [DATO NO DISPONIBLE — solicitar cuenta de pago a cuenta/crédito tributario]. Fortalecimiento patrimonial: '+((patPasPatr!=null&&patPasPatr>300)?'requerido (alto apalancamiento): evaluar aporte de accionistas o capitalización de deuda':'no requerido (apalancamiento bajo)')+'.';
  const patFort=[];
  if(roe>=15)patFort.push('ROE atractivo ('+roe.toFixed(0)+'%)');

  if(!patFort.length)patFort.push('[EVIDENCIA INSUFICIENTE para fortalezas materiales]');
  const patRiesgosTop=[];
  if(calidadPat<30)patRiesgosTop.push('Baja calidad patrimonial ('+calidadPat.toFixed(0)+'%): depende de utilidades acumuladas');
  if(utilRet>10e6)patRiesgosTop.push('Utilidades retenidas '+n$(utilRet)+' (🔴 >USD 10M): exposición tributaria SRI 2025');
  else if(utilRet>=100e3)patRiesgosTop.push('Utilidades retenidas '+n$(utilRet)+': revisión tributaria SRI 2025');
  if(resLegalPct<50)patRiesgosTop.push('Reserva legal '+resLegalPct.toFixed(0)+'% (<50% legal)');
  if(relPatr!=null&&relPatr>10)patRiesgosTop.push('Relacionadas '+relPatr.toFixed(0)+'% del patrimonio');
  if(!patRiesgosTop.length)patRiesgosTop.push('sin riesgos materiales');
  const patAcc=[];
  if(utilRet>=100e3)patAcc.push('definir política de dividendos/capitalización dentro del plazo (mitigar pago a cuenta SRI)');
  if(resLegalPct<50)patAcc.push('apropiar utilidades a reserva legal hasta el 50% del capital');
  if(calidadPat<30)patAcc.push('fortalecer la base de capital+reservas (capitalizar utilidades retenidas)');
  if(!patAcc.length)patAcc.push('mantener la política de reservas y retención de utilidades');
  const patSemTxt=patNivelTxt==='ALTO'?'🔴 Alerta':(patNivelTxt==='MEDIO'?'🟡 Atención':'🟢 Normal');
  const patCierre='<b>Top 3 fortalezas patrimoniales:</b> '+patFort.slice(0,3).map((t,i)=>(i+1)+') '+t).join(' · ')+'.<br><b>Top 3 riesgos patrimoniales:</b> '+patRiesgosTop.slice(0,3).map((t,i)=>(i+1)+') '+t).join(' · ')+'.<br><b>Top 3 acciones para accionistas:</b> '+patAcc.slice(0,3).map((t,i)=>(i+1)+') '+t).join(' · ')+'.<br><b>Semáforo general del patrimonio:</b> '+patSemTxt+'.';
  const bloquePatrimonio=patKpiBand
    +'<div class="grid-2">'+patChart+patRiesgoTabla+'</div>'

      +cajaAB('A · Estructura patrimonial',patA,'teal')
      +cajaAB('B · Análisis financiero, societario y tributario',patB,'gold')

  '<div class="sec-head"><div class="sec-num">02 · Estado de Situación Financiera</div><div class="sec-title">Balance general comparativo · '+curLbl+'</div><div class="sec-sub">Análisis vertical sobre total de activos.'+subDates+(usarDet?'':' Clic en cualquier valor azul para editar.')+'</div>'+toggle+'</div>'

  +'<div class="panel"><div class="panel-title">'+tituloTabla+'</div><table><thead><tr><th>Cuenta</th>'+BLBL.map(yy=>'<th>'+yy+'</th>').join('')+'<th>Var</th>'+BLBL.map(yy=>'<th>%'+yy+'</th>').join('')+'</tr></thead><tbody>'+tablaHTML+'</tbody></table></div>';
