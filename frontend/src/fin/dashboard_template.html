// ════ INDICADORES FINANCIEROS (clasificados · vista del accionista) ════
function renderIndicadores(C){
  const y=activeYear,_yi=YRS.indexOf(y),py=_yi>0?YRS[_yi-1]:null,c=C[y];
  const g=(k,yr)=>(D[k]&&D[k][yr]!=null)?D[k][yr]:0;
  const idx=yr=>YRS.indexOf(yr);
  const diasOf=yr=>{const m=(Array.isArray(MESES)&&MESES[idx(yr)])?MESES[idx(yr)]:12;return m*30.42;};
  const dpoOf=yr=>{const co=Math.abs(g('costoVta',yr));return co?Math.round(g('cxp',yr)/(co/diasOf(yr))):0;};
  const ebitdaAn=yr=>{const m=(Array.isArray(MESES)&&MESES[idx(yr)])?MESES[idx(yr)]:12;return C[yr].ebitda*(12/m);};
  const acida=yr=>C[yr].pasCorr?(C[yr].actCorr-g('inventario',yr))/C[yr].pasCorr:0;
  const dEbitda=yr=>{const e=ebitdaAn(yr);return e?(g('oblBanc',yr)+g('prestamosLP',yr))/e:null;};
  const icr=yr=>{const gf=Math.abs(g('gastFin',yr));return gf?C[yr].ebit/gf:null;};
  const roa=yr=>C[yr].totalAct?C[yr].utilNeta/C[yr].totalAct:0;
  const apal=yr=>C[yr].patrimonio?C[yr].totalAct/C[yr].patrimonio:0;
  const endPatr=yr=>C[yr].patrimonio?C[yr].totalPas/C[yr].patrimonio:0;
  const mgEbitda=yr=>g('ingOrd',yr)?C[yr].ebitda/g('ingOrd',yr):0;
  const ciclo=yr=>C[yr].dio+C[yr].dso-dpoOf(yr);
  const fX=v=>v==null?'—':v.toFixed(2)+'x',fP=v=>v==null?'—':(v*100).toFixed(1)+'%',fD=v=>v==null?'—':Math.round(v)+' d';
  const dot=cc=>'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--'+cc+');margin-right:7px;vertical-align:middle"></span>';
  const semLiq=v=>v>=1.5?'green':(v>=1?'gold':'red'),semEnd=v=>v<=.4?'green':(v<=.6?'gold':'red'),semDE=v=>v==null?'grayL':(v<2.5?'green':(v<3.5?'gold':(v<4.5?'amber':'red'))),semICR=v=>v==null?'grayL':(v>3?'green':(v>1.5?'gold':'red')),semROE=v=>v>=.15?'green':(v>=.08?'gold':'red');
  const row=(label,fn,fmt,sem,nota)=>{const cur=fn(y),prev=py?fn(py):null,co=sem(cur);return '<tr><td style="text-align:left">'+dot(co)+label+(nota?'<div style="font-size:9.5px;color:var(--grayL);opacity:.8">'+nota+'</div>':'')+'</td><td class="mono" style="color:var(--grayL)">'+(prev==null?'—':fmt(prev))+'</td><td class="mono" style="color:var(--'+co+')">'+fmt(cur)+'</td></tr>';};
  const cat=(titulo,rows,chart)=>'<div class="panel"><div class="panel-title">'+titulo+'</div><div class="grid-2" style="align-items:start">'+'<table style="font-size:12px"><thead><tr><th style="text-align:left">Indicador</th><th>'+(py||'Ant.')+'</th><th>'+y+'</th></tr></thead><tbody>'+rows.join('')+'</tbody></table><div>'+chart+'</div></div></div>';
  const t=v=>'teal';
  // Liquidez
  const liqRows=[row('Razón corriente',yr=>C[yr].liquidez,fX,semLiq,'AC / PC · cobertura de corto plazo'),row('Prueba ácida',acida,fX,v=>v>=1?'green':(v>=.8?'gold':'red'),'(AC − inventario) / PC'),row('Capital de trabajo',yr=>C[yr].actCorr-C[yr].pasCorr,n$,v=>v>=0?'green':'red','AC − PC')];
  const liqChart=svgBarsComp(['Razón corr.','Prueba ácida'],[py?C[py].liquidez:0,py?acida(py):0],[c.liquidez,acida(y)],py||'Ant.',y);
  // Actividad
  const actRows=[row('Rotación de activos',yr=>C[yr].rotAct,fX,v=>v>=1?'green':'gold','ventas anualizadas / activos'),row('Días de inventario (DIO)',yr=>C[yr].dio,fD,v=>v<=90?'green':(v<=120?'gold':'amber'),'inventario en bodega'),row('Días de cobro (DSO)',yr=>C[yr].dso,fD,v=>v<=45?'green':(v<=60?'gold':'amber'),'recuperación de cartera'),row('Días de pago (DPO)',dpoOf,fD,t,'plazo a proveedores'),row('Ciclo de conversión de efectivo',ciclo,fD,v=>v<=90?'green':(v<=150?'gold':'amber'),'DIO + DSO − DPO')];
  const actChart=svgBarsComp(['DIO','DSO','DPO','Ciclo'],[py?C[py].dio:0,py?C[py].dso:0,py?dpoOf(py):0,py?ciclo(py):0],[c.dio,c.dso,dpoOf(y),ciclo(y)],py||'Ant.',y);
  // Endeudamiento
  const endRows=[row('Endeudamiento del activo',yr=>C[yr].endeud,fP,semEnd,'Pasivo / Activo'),row('Endeudamiento patrimonial',endPatr,fP,v=>v<=1?'green':(v<=2?'gold':'red'),'Pasivo / Patrimonio'),row('Apalancamiento',apal,fX,v=>v<=2?'green':(v<=3?'gold':'red'),'Activo / Patrimonio'),row('Deuda financiera / EBITDA',dEbitda,fX,semDE,'bancos + préstamos / EBITDA anual'),row('Cobertura de intereses (ICR)',icr,fX,semICR,'EBIT / gastos financieros')];
  const endChart=svgBarsComp(['Endeud. %','Patrim. %'],[py?C[py].endeud*100:0,py?endPatr(py)*100:0],[c.endeud*100,endPatr(y)*100],py||'Ant.',y);
  // Rentabilidad
  const rentRows=[row('ROE',yr=>C[yr].roe,fP,semROE,'utilidad / patrimonio'),row('ROA',roa,fP,v=>v>=.08?'green':(v>=.04?'gold':'red'),'utilidad / activos'),row('Margen bruto',yr=>C[yr].mrgBruto,fP,t,'ventas − costo'),row('Margen operativo (EBIT)',yr=>C[yr].mrgOp,fP,t,''),row('Margen neto',yr=>C[yr].mrgNeto,fP,v=>v>=.1?'green':(v>=.05?'gold':'red'),'utilidad / ventas'),row('Margen EBITDA',mgEbitda,fP,t,'EBITDA / ventas')];
  const rentChart=svgLines(YRS.map(String),[{name:'ROE',data:YRS.map(yy=>+(C[yy].roe*100).toFixed(1)),color:CL.gold},{name:'ROA',data:YRS.map(yy=>+(roa(yy)*100).toFixed(1)),color:CL.blue},{name:'Margen neto',data:YRS.map(yy=>+(C[yy].mrgNeto*100).toFixed(1)),color:CL.green}],v=>v.toFixed(0)+'%');
  // DuPont (período, reconcilia con ROE): Margen neto × Rotación × Apalancamiento
  const rotP=g('ingOrd',y)&&c.totalAct?g('ingOrd',y)/c.totalAct:0,roeChk=c.mrgNeto*rotP*apal(y);
  const dpBox=(lbl,val)=>'<div style="flex:1;min-width:120px;text-align:center;background:var(--navy);border-radius:8px;padding:14px"><div style="font-size:10px;color:var(--grayL);text-transform:uppercase;letter-spacing:.5px">'+lbl+'</div><div class="mono" style="font-size:22px;font-weight:700;color:var(--teal);margin-top:4px">'+val+'</div></div>';
  const opn=s=>'<div style="display:flex;align-items:center;font-size:22px;color:var(--grayL);padding:0 2px">'+s+'</div>';
  const dupont='<div class="panel"><div class="panel-title">Descomposición DuPont del ROE · '+y+'</div><div style="display:flex;flex-wrap:wrap;gap:8px;align-items:stretch">'+dpBox('Margen neto',fP(c.mrgNeto))+opn('×')+dpBox('Rotación (período)',rotP.toFixed(3)+'x')+opn('×')+dpBox('Apalancamiento',apal(y).toFixed(3)+'x')+opn('=')+'<div style="flex:1;min-width:120px;text-align:center;background:rgba(199,168,60,.12);border:1px solid var(--gold);border-radius:8px;padding:14px"><div style="font-size:10px;color:var(--grayL);text-transform:uppercase;letter-spacing:.5px">ROE</div><div class="mono" style="font-size:22px;font-weight:700;color:var(--gold);margin-top:4px">'+fP(roeChk)+'</div></div></div></div>';
  document.getElementById("sec-indicadores").innerHTML=
    '<div class="sec-head"><div class="sec-num">Indicadores Financieros</div><div class="sec-title">Indicadores clave para el accionista · '+y+(py?' vs '+py:'')+'</div><div class="sec-sub">Clasificados por liquidez, actividad, endeudamiento y rentabilidad, con semáforo por umbral.'+(py?'':' Falta período anterior para comparar.')+'</div></div>'
    +cat('Liquidez',liqRows,liqChart)
    +cat('Actividad y rotación',actRows,actChart)
    +cat('Endeudamiento y solvencia',endRows,endChart)
    +cat('Rentabilidad',rentRows,rentChart)
    +dupont;
}

function renderVariaciones(C){
  // Si hay comparaciones tipadas (balances con cortes parciales), se renderizan
  // las CORRECTAS (parcial vs parcial + anual), evitando el cruce engañoso de un
  // corte de 5 meses contra un año de 12 meses.
  if(COMPARACIONES && (COMPARACIONES.esf || COMPARACIONES.eri)){
    const col=(s)=>s==='p'?'green':s==='n'?'red':'grayL';
    const tabla=(blk,titulo)=>{
      if(!blk||!blk.filas||!blk.filas.length) return '';
      const head='<tr><th style="text-align:left;padding:6px 8px;border-bottom:1px solid rgba(13,115,119,.3)">Concepto</th>'+blk.columnas.map(c=>'<th style="text-align:right;padding:6px 8px;border-bottom:1px solid rgba(13,115,119,.3);white-space:nowrap">'+c+'</th>').join('')+'</tr>';
      const body=blk.filas.map(f=>'<tr><td style="text-align:left;padding:6px 8px;border-bottom:1px solid rgba(13,115,119,.12);color:var(--white)">'+f.c+'</td>'+f.celdas.map(cd=>'<td class="mono" style="text-align:right;padding:6px 8px;border-bottom:1px solid rgba(13,115,119,.12);white-space:nowrap;color:var(--'+col(cd.s)+')">'+cd.t+'</td>').join('')+'</tr>').join('');
      return '<div class="panel"><div class="panel-title">'+titulo+'</div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead>'+head+'</thead><tbody>'+body+'</tbody></table></div></div>';
    };
    document.getElementById("sec-variaciones").innerHTML=
      '<div class="sec-head"><div class="sec-num">03 · Análisis de Variaciones</div><div class="sec-title">Comparaciones por período</div><div class="sec-sub">Balance: cada corte vs. el inmediatamente anterior. Resultados: parcial vs. parcial del mismo corte del año previo (o anualizado si falta) y anual vs. anual. Nunca se cruza un corte de 5 meses con uno de 12 meses.</div></div>'
      +tabla(COMPARACIONES.esf,'Balance general (ESF · saldos por corte)')
      +tabla(COMPARACIONES.eri,'Estado de resultados (ERI · flujo del período)');
    return;
  }
  const ny=YRS.length, yA=YRS[0], yM=YRS[ny>=2?ny-2:0], yB=YRS[ny-1];
  const lineas=(p,q)=>[
    ['Ingresos',D.ingOrd[q]-D.ingOrd[p],pctv(D.ingOrd[q],D.ingOrd[p])],
    ['Utilidad neta',C[q].utilNeta-C[p].utilNeta,pctv(C[q].utilNeta,C[p].utilNeta)],
    ['CxC comerciales',D.cxc[q]-D.cxc[p],pctv(D.cxc[q],D.cxc[p])],

function renderDecisiones(C){
  const yA=YRS[0], yB=YRS[YRS.length-1];
  const fort=[];
  if(C[yB].liquidez>=1.5) fort.push('Liquidez corriente sólida: '+C[yB].liquidez.toFixed(2)+'x al cierre de '+yB);
  if(C[yB].endeud<=0.4) fort.push('Bajo endeudamiento: '+(C[yB].endeud*100).toFixed(1)+'% de los activos');
  if(C[yB].patrimonio>=C[yA].patrimonio) fort.push('Patrimonio en crecimiento: '+n$(C[yB].patrimonio)+' ('+pctv(C[yB].patrimonio,C[yA].patrimonio)+' vs '+yA+')');
  if(C[yB].roe>=0.15) fort.push('ROE atractivo: '+(C[yB].roe*100).toFixed(1)+'%');
  fort.push('Activos líquidos al cierre: '+n$(D.efectivo[yB]+D.actFin[yB]));
  if(D.ingOrd[yB]>D.ingOrd[yA]) fort.push('Ingresos en expansión: '+pctv(D.ingOrd[yB],D.ingOrd[yA])+' en el periodo');
  const aten=[];
  if(C[yB].mrgBruto<C[yA].mrgBruto) aten.push('Margen bruto comprimido: '+(C[yB].mrgBruto*100).toFixed(1)+'% vs '+(C[yA].mrgBruto*100).toFixed(1)+'% ('+yA+')');
  if(C[yB].liquidez<1) aten.push('Liquidez ajustada: '+C[yB].liquidez.toFixed(2)+'x — vigilar capital de trabajo');
  if(C[yB].endeud>0.6) aten.push('Endeudamiento elevado: '+(C[yB].endeud*100).toFixed(1)+'%');
  if(C[yB].dso>60) aten.push('Días de cobro altos (DSO '+C[yB].dso+' días) — revisar política de crédito');
  if(D.ingOrd[yB]<D.ingOrd[yA]) aten.push('Ingresos a la baja: '+pctv(D.ingOrd[yB],D.ingOrd[yA])+' en el periodo');
  aten.push('Documentar partidas no recurrentes y operaciones con relacionadas');
  const dec=[['1','Distribución de utilidades '+yB,'Utilidad neta '+n$(C[yB].utilNeta)+'. Evaluar política de dividendos vs. capitalización según necesidades de caja y plan de inversión.','gold'],['2','Plan de inversión (CAPEX)','Propiedad, planta y equipo varió '+pctv(D.propEquip[yB],D.propEquip[yA])+' en el periodo (de '+n$(D.propEquip[yA])+' a '+n$(D.propEquip[yB])+'). Definir presupuesto de renovación y retorno esperado.','blue'],['3','Gestión de excedentes de liquidez','Activos líquidos '+n$(D.efectivo[yB]+D.actFin[yB])+'. Revisar el portafolio de inversiones y su rendimiento (ver sección Inversiones).','teal']];
  document.getElementById("sec-decisiones").innerHTML=
  '<div class="sec-head"><div class="sec-num">05 · Conclusiones y Decisiones</div><div class="sec-title">Puntos para la junta de accionistas</div><div class="sec-sub">Síntesis ejecutiva y aprobaciones requeridas.</div></div>'
  +'<div class="grid-2"><div class="panel"><div class="panel-title" style="color:var(--greenOk)">Fortalezas identificadas</div>'+fort.map(t=>'<div class="insight"><span style="color:var(--greenOk)">•</span>'+t+'</div>').join('')+'</div>'
  +'<div class="panel"><div class="panel-title" style="color:var(--amber)">Puntos de atención</div>'+aten.map(t=>'<div class="insight"><span style="color:var(--amber)">•</span>'+t+'</div>').join('')+'</div></div>'
  +'<div class="panel">'+dec.map(d=>'<div class="decision"><div class="decision-num" style="background:rgba(199,168,60,.12);border:1px solid var(--'+d[3]+');color:var(--'+d[3]+')">'+d[0]+'</div><div><div style="font-size:13px;font-weight:600;color:var(--white);font-family:Montserrat,Arial;margin-bottom:4px">'+d[1]+' <span class="tag warn">Aprobación requerida</span></div><div style="font-size:12px;color:var(--grayL);line-height:1.6">'+d[2]+'</div></div></div>').join('')+'</div>';
}

  [['Margen bruto',YRS.map(yy=>(C[yy].mrgBruto*100).toFixed(1)+'%')],['Margen operativo',YRS.map(yy=>(C[yy].mrgOp*100).toFixed(1)+'%')],['Margen neto',YRS.map(yy=>(C[yy].mrgNeto*100).toFixed(1)+'%')],['Liquidez corriente',YRS.map(yy=>C[yy].liquidez.toFixed(2)+'x')],['Endeudamiento',YRS.map(yy=>(C[yy].endeud*100).toFixed(1)+'%')],['ROE',YRS.map(yy=>(C[yy].roe*100).toFixed(1)+'%')],['DSO (días)',YRS.map(yy=>C[yy].dso+' días')]].forEach(r=>{s3+='<tr><td style="'+tdL+'">'+r[0]+'</td>'+r[1].map(v=>'<td style="'+td+'">'+v+'</td>').join('')+'</tr>';});
  s3+='<tr><td colspan="'+(YRS.length+1)+'" style="background:'+NV+';border:1px solid '+NV+'">&nbsp;</td></tr>';
  s3+='<tr><td style="'+thL+'">KPIs OPERATIVOS (completar)</td>'+YRS.map(yy=>'<td style="'+th+'">'+yy+'</td>').join('')+'</tr>';
  [['numHab','N° habitaciones/tiendas'],['ocupacion','Ocupación (%)'],['adr','Tarifa promedio (ADR)'],['nps','NPS satisfacción']].forEach(r=>{const[k,l]=r;s3+='<tr><td style="'+tdL+'">'+l+'</td>'+YRS.map(yy=>'<td style="'+td+'">'+(D[k][yy]!=null?D[k][yy]:'')+'</td>').join('')+'</tr>';});
  s3+='<tr><td style="'+totL+'">RevPAR (calculado)</td>'+YRS.map(yy=>'<td style="'+goldC+'">'+(C[yy].revpar!=null?'$'+C[yy].revpar.toFixed(0):'')+'</td>').join('')+'</tr>';

  const xls='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>Dashboard</x:Name><x:WorksheetOptions><x:DoNotDisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet><x:ExcelWorksheet><x:Name>Estado de Resultados</x:Name><x:WorksheetOptions><x:DoNotDisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet><x:ExcelWorksheet><x:Name>Balance General</x:Name><x:WorksheetOptions><x:DoNotDisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet><x:ExcelWorksheet><x:Name>KPIs y Ratios</x:Name><x:WorksheetOptions><x:DoNotDisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body><table style="border-collapse:collapse">'+d+'</table><table style="border-collapse:collapse">'+s1+'</table><table style="border-collapse:collapse">'+s2+'</table><table style="border-collapse:collapse">'+s3+'</table></body></html>';
  const blob=new Blob(['\ufeff'+xls],{type:'application/vnd.ms-excel'});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="Galapagos_Safari_Dashboard.xls";a.click();URL.revokeObjectURL(url);
  showToast("✓ Dashboard descargado — se abre en Excel con el diseño");
}

// ════ EXPORT — Snapshot HTML interactivo ════
function exportHTML(){
  let src=document.documentElement.outerHTML;
  src=src.replace('let D=JSON.parse(JSON.stringify(DEFAULT));','let D='+JSON.stringify(D)+';');
  // conservar el tema, layout y nivel elegidos en la copia descargada
  src=src.replace(/let THEME=[^;]*;/,'let THEME='+JSON.stringify(THEME)+';');
  src=src.replace(/let LAYOUT=[^;]*;/,'let LAYOUT='+JSON.stringify(LAYOUT)+';');
  src=src.replace(/let NIVEL=[^;]*;/,'let NIVEL='+JSON.stringify(NIVEL)+';');
  src=src.replace(/let CHART_STYLE=[^;]*;/,'let CHART_STYLE='+JSON.stringify(CHART_STYLE)+';');
  const blob=new Blob(['<!DOCTYPE html>\n'+src],{type:'text/html'});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="Dashboard_Interactivo.html";a.click();URL.revokeObjectURL(url);
  showToast("✓ Dashboard HTML interactivo descargado");
}
function resetData(){D=JSON.parse(JSON.stringify(DEFAULT));renderAll();showToast("↺ Datos restaurados a valores auditados");}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}

// ════ INIT ════
buildNav();applyLayout(LAYOUT);const _sc=document.getElementById('selChart');if(_sc)_sc.value=CHART_STYLE;applyTheme(THEME);
</script>
