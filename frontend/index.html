<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/assets/audit-ia-emblema.png" />
    <title>AUDIT-IA</title>
    <script>
      // Aplica el tema antes de montar React (evita parpadeo). Default: navy.
      (function () {
        try {
          document.documentElement.setAttribute(
            "data-theme", localStorage.getItem("ab_theme") || "navy"
          );
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
